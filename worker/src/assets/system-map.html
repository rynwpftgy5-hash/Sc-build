/* Wrapper page styles — match the SpaceSC palette and tool-surface chrome */
:root {
  --bg: #faf9f5;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f1efe8;
  --color-background-tertiary: #e7e5dc;
  --color-text-primary: #1f1d18;
  --color-text-secondary: #56544c;
  --color-text-tertiary: #888780;
  --color-border-tertiary: #e7e5dc;
  --color-border-secondary: #d4d1c4;
  --border-radius-md: 10px;
  --border-radius-lg: 16px;
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
}
* { box-sizing: border-box; }
html, body {
  background: var(--bg);
  color: var(--color-text-primary);
  margin: 0; padding: 0;
  font-family: var(--font-sans);
  font-size: 14px; line-height: 1.5;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
.page-header {
  padding: 20px 24px 12px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  max-width: 1100px; margin: 0 auto;
}
.page-title {
  font-size: 22px; font-weight: 600; color: var(--color-text-primary);
  margin-bottom: 4px;
}
.page-sub {
  font-size: 13px; color: var(--color-text-secondary);
}
.page-body { padding: 18px 24px 40px; max-width: 1100px; margin: 0 auto; }
</style>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--h:56px;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

.outer{font-family:var(--font-sans);padding:0;}

/* sticky header */
.uc-header{
  position:sticky;top:0;z-index:50;
  display:grid;grid-template-columns:repeat(5,1fr);gap:2px;
  background:var(--color-background-primary);
  padding:12px 0 8px;
  border-bottom:0.5px solid var(--color-border-tertiary);
  margin-bottom:12px;
}
.uc-tab{
  border-radius:var(--border-radius-md);
  padding:10px 12px;
  cursor:pointer;
  border:1.5px solid transparent;
  transition:border-color .15s,background .15s;
  background:var(--color-background-secondary);
}
.uc-tab:hover{background:var(--color-background-tertiary);}
.uc-tab.active{border-color:var(--uc-color,#185FA5);background:var(--color-background-primary);}
.uc-tab-num{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:3px;}
.uc-tab-name{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-bottom:4px;}
.uc-tab-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);}
.uc-tab-bar{height:3px;border-radius:2px;margin-top:8px;background:var(--color-border-tertiary);overflow:hidden;}
.uc-tab-fill{height:100%;border-radius:2px;background:var(--uc-color,#185FA5);transition:width .3s;}

/* legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* detail pane */
.detail-pane{display:none;}
.detail-pane.open{display:block;}

/* tree */
.tree{display:flex;flex-direction:column;gap:6px;}

/* phase group */
.phase-group{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;}
.phase-head{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  cursor:pointer;background:var(--color-background-secondary);
  user-select:none;
  border-bottom:0.5px solid transparent;
  transition:background .12s;
}
.phase-head:hover{background:var(--color-background-tertiary);}
.phase-head.open{border-bottom-color:var(--color-border-tertiary);}
.phase-chevron{font-size:11px;color:var(--color-text-tertiary);transition:transform .2s;flex-shrink:0;}
.phase-chevron.open{transform:rotate(90deg);}
.phase-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;flex:1;}
.phase-pills{display:flex;gap:4px;flex-wrap:wrap;}
.phase-body{display:none;padding:8px 10px;display:none;flex-direction:column;gap:6px;}
.phase-body.open{display:flex;}

/* feature node */
.feat{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;
  border-radius:var(--border-radius-md);
  border:0.5px solid var(--color-border-tertiary);
  background:var(--color-background-primary);
  cursor:pointer;
  transition:border-color .12s;
  position:relative;
}
.feat:hover{border-color:var(--color-border-secondary);}
.feat-connector{
  position:absolute;left:20px;top:-6px;
  width:0.5px;height:6px;
  background:var(--color-border-secondary);
}
.feat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.feat-body{flex:1;min-width:0;}
.feat-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.feat-title{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.feat-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;flex-shrink:0;border:0.5px solid;}
.feat-desc{display:none;font-size:12px;color:var(--color-text-secondary);line-height:1.5;margin-top:5px;}
.feat-desc.open{display:block;}
.feat-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:4px;}
.feat-expand{font-size:10px;color:var(--color-text-tertiary);margin-left:auto;flex-shrink:0;padding:1px 5px;}

/* status colors */
.built   {background:#3B6D11;}
.partial {background:#854F0B;}
.gap     {background:#A32D2D;}
.queued  {background:#534AB7;}
.future  {background:#888780;}

.badge-built  {color:#3B6D11;border-color:#3B6D11;background:rgba(59,109,17,.08);}
.badge-partial{color:#854F0B;border-color:#854F0B;background:rgba(133,79,11,.08);}
.badge-gap    {color:#A32D2D;border-color:#A32D2D;background:rgba(163,45,45,.1);}

.badge-future {color:#888780;border-color:#888780;background:rgba(136,135,128,.08);}

/* next action banner */

.next-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px;}
.next-why{font-size:12px;color:var(--color-text-secondary);line-height:1.5;}

.empty-state{text-align:center;padding:40px 20px;color:var(--color-text-tertiary);font-size:13px;}

const STATUS_BADGES = {built:'badge-built',partial:'badge-partial',gap:'badge-gap',queued:'badge-queued',future:'badge-future'};
const STATUS_DOTS   = {built:'built',partial:'partial',gap:'gap',queued:'queued',future:'future'};
const STATUS_LABELS = {built:'Built',partial:'Partial',gap:'Gap',queued:'Queued',future:'Future'};

let activeUC = 'uc1';
let expandedFeats = new Set();
let expandedPhases = {};

function pctLabel(pct){
  if(pct>=80) return 'Largely complete';
  if(pct>=50) return 'Core built';
  if(pct>=20) return 'Early build';
  return 'Not started';
}

function renderHeader(){
  const h = document.getElementById('ucHeader');
  h.innerHTML = '';
  UCS.forEach(uc => {
    const tab = document.createElement('div');
    tab.className = 'uc-tab'+(uc.id===activeUC?' active':'');
    tab.style.setProperty('--uc-color', uc.color);
    tab.innerHTML = `
      <div class="uc-tab-num">${uc.num}</div>
      <div class="uc-tab-name">${uc.name}</div>
      <div class="uc-tab-status">
        <div class="ldot ${STATUS_DOTS[uc.pct>=80?'built':uc.pct>=50?'partial':uc.pct>=20?'queued':'gap']}" style="background:${uc.color}"></div>
        <span>${pctLabel(uc.pct)}</span>
      </div>
      <div class="uc-tab-bar"><div class="uc-tab-fill" style="width:${uc.pct}%"></div></div>
    `;
    tab.onclick = () => { activeUC = uc.id; renderAll(); };
    h.appendChild(tab);
  });
}

function renderDetail(){
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  const uc = UCS.find(u => u.id===activeUC);
  if(!uc) return;

  mc.style.setProperty('--uc-color', uc.color);

  // next action banner
  const banner = document.createElement('div');
  banner.className = 'next-banner';
  banner.innerHTML = `
    <div class="next-label">Next build action</div>
    <div class="next-title">${uc.next.title}</div>
    <div class="next-why">${uc.next.why}</div>
  `;
  mc.appendChild(banner);

  // uc description
  const desc = document.createElement('div');
  desc.style.cssText = 'font-size:13px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:14px;';
  desc.textContent = uc.job;
  mc.appendChild(desc);

  // tree
  const tree = document.createElement('div');
  tree.className = 'tree';

  uc.phases.forEach((phase, pi) => {
    const phaseKey = `${uc.id}-${pi}`;
    if(!(phaseKey in expandedPhases)) expandedPhases[phaseKey] = true;
    const isOpen = expandedPhases[phaseKey];

    // count statuses
    const counts = {};
    phase.features.forEach(f => { counts[f.status] = (counts[f.status]||0)+1; });

    const group = document.createElement('div');
    group.className = 'phase-group';

    const head = document.createElement('div');
    head.className = 'phase-head'+(isOpen?' open':'');
    const pills = Object.entries(counts).map(([s,n]) =>
      `<span class="feat-badge badge-${s}" style="font-size:10px;padding:1px 6px;">${n} ${STATUS_LABELS[s]}</span>`
    ).join('');
    head.innerHTML = `
      <span class="phase-chevron${isOpen?' open':''}">▶</span>
      <span class="phase-label">${phase.label}</span>
      <div class="phase-pills">${pills}</div>
    `;
    head.onclick = () => {
      expandedPhases[phaseKey] = !expandedPhases[phaseKey];
      renderDetail();
    };
    group.appendChild(head);

    const body = document.createElement('div');
    body.className = 'phase-body'+(isOpen?' open':'');

    phase.features.forEach((feat, fi) => {
      const featKey = `${uc.id}-${pi}-${fi}`;
      const isExpanded = expandedFeats.has(featKey);

      const node = document.createElement('div');
      node.className = 'feat';
      if(fi > 0){
        const conn = document.createElement('div');
        conn.className = 'feat-connector';
        node.appendChild(conn);
      }
      node.innerHTML = `
        <div class="feat-dot ${STATUS_DOTS[feat.status]}"></div>
        <div class="feat-body">
          <div class="feat-top">
            <span class="feat-title">${feat.title}</span>
            <span class="feat-badge badge-${feat.status}">${feat.badge}</span>
            ${feat.ref ? `<span class="feat-meta">${feat.ref}</span>` : ''}
            <span class="feat-expand" style="color:var(--color-text-tertiary)">${isExpanded?'▲ less':'▼ more'}</span>
          </div>
          <div class="feat-desc${isExpanded?' open':''}">${feat.desc}</div>
        </div>
      `;
      node.onclick = () => {
        if(expandedFeats.has(featKey)) expandedFeats.delete(featKey);
        else expandedFeats.add(featKey);
        renderDetail();
      };
      body.appendChild(node);
    });

    group.appendChild(body);
    tree.appendChild(group);
  });

  mc.appendChild(tree);
}

function renderAll(){
  renderHeader();
  renderDetail();
}

renderAll();
