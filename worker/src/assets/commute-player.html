// Helper: build a human source-context string for capture payloads
function sourceContextString(src) {
  const ts = fmtTime(src.timestamp);
  if (src.kind === "article") {
    return `Captured during article "${truncate(src.title || src.articleTitle || "(untitled)", 80)}" at ${ts}.`;
  }
  if (src.kind === "brief") {
    return `Captured during review brief for module ${src.moduleId} at ${ts}.`;
  }
  if (src.kind === "module" || src.kind === "module-due") {
    return `Captured during episode for module ${src.moduleId} at ${ts}.`;
  }
  // B7: explicit case so the user-facing source line says "today's briefing"
  // instead of leaking the internal kind string "daily-briefing".
  if (src.kind === "daily-briefing") {
    return `Captured during today's briefing at ${ts}.`;
  }
  return `Captured during ${src.kind} at ${ts}.`;
}

function CaptureSheet({ kind, sourceInfo, onClose, onDone, showToast }) {
  const meta = CAPTURE_KINDS[kind];
  const [text, setText] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const recogRef = useRef(null);
  const hasSpeech = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const [recording, setRecording] = useState(false);

  const startRecord = () => {
    if (!hasSpeech) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.continuous = true; r.interimResults = true; r.lang = "en-US";
    let final = "";
    r.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t + " "; else interim += t;
      }
      setText((final + interim).trim());
    };
    r.onerror = () => setRecording(false);
    r.onend = () => setRecording(false);
    recogRef.current = r;
    try { r.start(); setRecording(true); } catch (_) { setRecording(false); }
  };
  const stopRecord = () => { if (recogRef.current) try { recogRef.current.stop(); } catch (_) {} setRecording(false); };

  useEffect(() => {
    if (hasSpeech) startRecord();
    return () => { if (recogRef.current) try { recogRef.current.stop(); } catch (_) {} };
  }, []);

  const submit = async () => {
    if (!text.trim()) return;
    setSubmitting(true);
    try {
      const payload = meta.payload(text.trim(), sourceInfo);
      const res = await API[meta.api](payload);
      let msg = meta.title + " saved";
      if (res && res.learning_gap_id) {
        msg = "Learning gap captured · we'll start building your series.";
        // D4: persist a tracking record so HomeScreen can show the build
        // progress until the first brief lands.
        try { trackingAdd(res.learning_gap_id, text.trim().slice(0, 80)); } catch (_) {}
      }
      // Item 4C: push a pending entry so the Captures tab shows it
      // immediately, before the server-side captures-today refetch lands.
      try { pendingAdd(kind, text.trim()); } catch (_) {}
      onDone(msg);
    } catch (e) {
      if (e.message && e.message.includes("mac_offline")) {
        onDone("Captured · we'll finish syncing when the local agent is back online.");
      } else {
        showToast && showToast(meta.title + " failed: " + e.message);
        setSubmitting(false);
      }
    }
  };

  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" role="dialog" aria-modal="true" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-handle"></div>
        <div className="sheet-title">{meta.icon} {meta.title}</div>
        <div className="sheet-sub">At {fmtTime(sourceInfo.timestamp)} in {sourceInfo.kind === "brief" ? "this brief" : "this episode"}.</div>
        <textarea className="sheet-input" placeholder={meta.placeholder} value={text} onChange={(e) => setText(e.target.value)} autoFocus />
        {hasSpeech && (
          <div style={{ textAlign: "center", marginTop: 8 }}>
            <button className="play-btn-secondary" onClick={recording ? stopRecord : startRecord}>
              {recording ? "⏹ Stop recording" : "🎙 Record again"}
            </button>
          </div>
        )}
        <div className="sheet-buttons">
          <button className="sheet-btn-secondary" onClick={onClose}>Cancel</button>
          <button className="sheet-btn-primary" onClick={submit} disabled={submitting || !text.trim()}>{submitting ? "Saving…" : "Save"}</button>
        </div>
      </div>
    </div>
  );
}

// PLAYER OVERLAY
function PlayerOverlay({ playing, audioRef, onClose, onEnded, showToast, bumpRefresh, onOpenSeries, onSwapAudio, commuteQueue, commuteIdx, onSkipNext }) {
  const [isPlaying, setIsPlaying] = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);
  const [flagOpen, setFlagOpen] = useState(false);
  const [reactOpen, setReactOpen] = useState(false);
  const [captureOpen, setCaptureOpen] = useState(null);
  const [approving, setApproving] = useState(false);
  // Post-approve state: "idle" | "approving" | "audio-cooking" | "audio-ready"
  //                   | "audio-failed" (D1) | "audio-taking-longer" (F14)
  //                   | "audio-check-failed" | "audio-check-auth"
  const [postApprove, setPostApprove] = useState("idle");
  const [postApproveAudioUrl, setPostApproveAudioUrl] = useState(null);
  const [postApproveError, setPostApproveError] = useState(null);
  const [retryingAudio, setRetryingAudio] = useState(false);

  const retryAudio = async () => {
    if (!playing.moduleId) return;
    setRetryingAudio(true);
    try {
      await API.retryModuleTts(playing.moduleId);
      showToast && showToast("Audio generation restarted…");
      setPostApproveError(null);
      setPostApprove("audio-cooking");
    } catch (e) {
      showToast && showToast("Retry failed: " + e.message);
    } finally {
      setRetryingAudio(false);
    }
  };

  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    const onTime = () => setCurrentTime(a.currentTime);
    const onDur = () => setDuration(a.duration || 0);
    const onPlay = () => setIsPlaying(true);
    const onPause = () => setIsPlaying(false);
    const onEnd = () => { setIsPlaying(false); onEnded && onEnded(); };
    a.addEventListener("timeupdate", onTime);
    a.addEventListener("durationchange", onDur);
    a.addEventListener("loadedmetadata", onDur);
    a.addEventListener("play", onPlay);
    a.addEventListener("pause", onPause);
    a.addEventListener("ended", onEnd);
    setIsPlaying(!a.paused);
    setCurrentTime(a.currentTime);
    setDuration(a.duration || 0);
    return () => {
      a.removeEventListener("timeupdate", onTime);
      a.removeEventListener("durationchange", onDur);
      a.removeEventListener("loadedmetadata", onDur);
      a.removeEventListener("play", onPlay);
      a.removeEventListener("pause", onPause);
      a.removeEventListener("ended", onEnd);
    };
  }, []);

  const toggle = () => { const a = audioRef.current; if (!a) return; if (a.paused) a.play(); else a.pause(); };
  const skip = (d) => { const a = audioRef.current; if (!a) return; a.currentTime = Math.max(0, Math.min(a.duration || 0, a.currentTime + d)); };
  const seekTo = (f) => { const a = audioRef.current; if (!a || !a.duration) return; a.currentTime = f * a.duration; };

  // §8.4a.25 F6 dead-end fix — outbound content action. Brief/module audio
  // is served by public endpoints, so the URL works on a recipient's phone
  // or work laptop without an auth token. Articles use a client-side blob
  // URL, so we fall through to a direct download instead.
  const shareAudio = async () => {
    let shareUrl = null;
    if (playing.kind === "brief" && playing.moduleId) shareUrl = API.briefAudioUrl(playing.moduleId);
    else if ((playing.kind === "module" || playing.kind === "module-due") && playing.moduleId) shareUrl = API.moduleAudioUrl(playing.moduleId);
    if (shareUrl) {
      try { if (navigator.share) { await navigator.share({ title: playing.title || "SpaceSC episode", url: shareUrl }); return; } } catch (_) {}
      try { await navigator.clipboard.writeText(shareUrl); showToast && showToast("Link copied · paste into email"); return; }
      catch (_) { showToast && showToast(shareUrl); return; }
    }
    if (playing.audioUrl) {
      const safe = (playing.title || "spacesc-audio").replace(/[^a-z0-9-]+/gi, "-").toLowerCase().slice(0, 60) || "spacesc-audio";
      const a = document.createElement("a");
      a.href = playing.audioUrl; a.download = safe + ".mp3";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast && showToast("Downloading audio…");
    }
  };

  // Keyboard shortcuts (D7): Space toggles play/pause, ←/→ skip 15s,
  // Escape closes the topmost open surface (sheet first, then overlay).
  // Ignored when a text input is focused so typing in a capture sheet works.
  useEffect(() => {
    const onKey = (e) => {
      const tgt = e.target;
      const tag = tgt && tgt.tagName;
      const isTyping = tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (tgt && tgt.isContentEditable);
      if (e.key === "Escape") {
        if (flagOpen) { setFlagOpen(false); e.preventDefault(); return; }
        if (reactOpen) { setReactOpen(false); e.preventDefault(); return; }
        if (captureOpen) { setCaptureOpen(null); e.preventDefault(); return; }
        if (!isTyping) { onClose(); e.preventDefault(); return; }
      }
      if (isTyping || flagOpen || reactOpen || captureOpen) return;
      if (e.key === " " || e.code === "Space") { toggle(); e.preventDefault(); return; }
      if (e.key === "ArrowLeft")  { skip(-15); e.preventDefault(); return; }
      if (e.key === "ArrowRight") { skip(15);  e.preventDefault(); return; }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [flagOpen, reactOpen, captureOpen]);

  const handleApprove = async () => {
    setApproving(true);
    setPostApprove("approving");
    try {
      await API.approve(playing.moduleId);
      showToast("Approved · audio generating (~2 min)");
      setPostApprove("audio-cooking");
      bumpRefresh();
    } catch (e) {
      showToast("Approve failed: " + e.message);
      setPostApprove("idle");
    } finally {
      setApproving(false);
    }
  };

  // After approve, poll pipeline-status every 20s for this gap. As soon as
  // audio_r2_key appears on this module, surface a "Listen to full episode"
  // button in the player. Stops polling after audio is ready or after 6 min.
  useEffect(() => {
    if (postApprove !== "audio-cooking" || !playing.gapId || !playing.moduleId) return;
    let cancelled = false;
    let tries = 0;
    let consecutiveFailures = 0;
    const MAX_TRIES = 18;  // 18 × 20s = 6 min
    const poll = async () => {
      tries += 1;
      try {
        const r = await API.pipelineStatus(playing.gapId);
        consecutiveFailures = 0;
        const me = (r.modules || []).find((m) => m.id === playing.moduleId);
        if (!cancelled && me && me.audio_r2_key) {
          setPostApprove("audio-ready");
          setPostApproveAudioUrl(API.moduleAudioUrl(me.id));
          return;
        }
        // D1: backend-surfaced failure trumps the polling timeout. Wait
        // until attempts_count >= 2 so we don't flicker into "failed" mid
        // CF-queue auto-retry (max_retries=2 means up to 3 total attempts).
        if (!cancelled && me && me.audio_last_error && (me.audio_attempts_count || 0) >= 2 && !me.audio_r2_key) {
          setPostApproveError(me.audio_last_error);
          setPostApprove("audio-failed");
          return;
        }
      } catch (e) {
        if (e && e.code === "AUTH") {
          if (!cancelled) setPostApprove("audio-check-auth");
          return;
        }
        consecutiveFailures += 1;
        if (consecutiveFailures >= 3 && !cancelled) {
          setPostApprove("audio-check-failed");
          return;
        }
      }
      if (!cancelled && tries < MAX_TRIES) setTimeout(poll, 20_000);
      else if (!cancelled) setPostApprove("audio-taking-longer");
    };
    setTimeout(poll, 20_000);  // first check after 20s
    return () => { cancelled = true; };
  }, [postApprove, playing.gapId, playing.moduleId]);

  const progress = duration > 0 ? currentTime / duration : 0;
  const isBrief = playing.kind === "brief";

  return (
    <div className="player-overlay">
      <div className="player-head">
        <button className="player-head-close" onClick={onClose} aria-label="Minimize player">↓</button>
        <div className="player-head-title">{isBrief ? "Review brief" : playing.isDue ? "Re-listen · due now" : "Episode"}</div>
        <div style={{ width: 40 }}></div>
      </div>
      <div className="player-body">
        <div className="player-meta">
          {commuteQueue && commuteQueue.length > 0 && commuteIdx >= 0 && (
            <div className="player-kind" style={{ color: "var(--accent)", fontWeight: 600 }}>
              🚗 Drive · Track {commuteIdx + 1} of {commuteQueue.length}
              {commuteIdx + 1 < commuteQueue.length && (
                <span style={{ color: "var(--ink-mute)", fontWeight: 400, marginLeft: 6 }}>· {commuteQueue.length - commuteIdx - 1} more to play</span>
              )}
            </div>
          )}
          {playing.position && playing.totalPositions && (
            <div className="player-kind">Episode {playing.position} of {playing.totalPositions}</div>
          )}
          <div className="player-title">{playing.title}</div>
          {playing.series && <div className="player-series">{playing.series}</div>}
          {playing.voiceId && <div className="player-voice">Read by {voiceName(playing.voiceId)}</div>}
          {commuteQueue && commuteQueue.length > 0 && commuteIdx >= 0 && commuteIdx + 1 < commuteQueue.length && (
            <button onClick={onSkipNext} className="play-btn-secondary" style={{ marginTop: 8, fontSize: 12, padding: "6px 12px" }}>
              ⏭ Skip to next ({commuteQueue.length - commuteIdx - 1} left)
            </button>
          )}
        </div>

        <div className="scrubber-wrap">
          <div className="scrubber" onClick={(e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            seekTo((e.clientX - rect.left) / rect.width);
          }}>
            <div className="scrubber-fill" style={{ width: (progress * 100) + "%" }}></div>
          </div>
          <div className="times">
            <span>{fmtTime(currentTime)}</span>
            <span>{fmtTime(duration)}</span>
          </div>
        </div>

        <div className="transport">
          <button className="transport-skip" onClick={() => skip(-15)} aria-label="Back 15s">⏮</button>
          <button className="transport-play" onClick={toggle} aria-label={isPlaying ? "Pause" : "Play"}>{isPlaying ? "⏸" : "▶"}</button>
          <button className="transport-skip" onClick={() => skip(15)} aria-label="Forward 15s">⏭</button>
        </div>

        {isBrief && postApprove === "idle" && (
          <div className="verdict-row">
            <button className="verdict-approve" onClick={handleApprove} disabled={approving}>
              ✅ Approve
            </button>
            <button className="verdict-react" onClick={() => setReactOpen(true)} aria-label="React with voice">🎙</button>
          </div>
        )}

        {/* Post-approve state — replaces the verdict row so user knows what happened next */}
        {postApprove === "approving" && (
          <div style={{ padding: "16px", borderRadius: "var(--radius)", background: "var(--bg-sunken)", display: "flex", alignItems: "center", gap: 12 }}>
            <span className="spinner"></span>
            <div style={{ fontSize: 14, color: "var(--ink-soft)" }}>Approving…</div>
          </div>
        )}
        {postApprove === "audio-cooking" && (
          <div style={{ padding: "16px", borderRadius: "var(--radius)", background: "rgba(59,109,17,.07)", border: "0.5px solid var(--green)", color: "var(--green)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6 }}>✅ Approved · audio generating</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5 }}>
              The full episode audio is being generated by ElevenLabs · usually ready in about 2 minutes.
              You'll find it on the Series page when it lands, and the play button below will switch over.
            </div>
            {playing.gapId && (
              <div style={{ marginTop: 10 }}>
                <button className="play-btn-secondary" onClick={() => { onClose(); onOpenSeries && onOpenSeries(playing.gapId); }}>
                  Open series view →
                </button>
              </div>
            )}
          </div>
        )}
        {postApprove === "audio-ready" && postApproveAudioUrl && (
          <div style={{ padding: "16px", borderRadius: "var(--radius)", background: "rgba(59,109,17,.07)", border: "0.5px solid var(--green)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6, color: "var(--green)" }}>🎧 Full episode is ready</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: 10 }}>
              The ~10-minute episode just finished generating. Listen now or save for your drive.
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button className="play-btn" onClick={() => onSwapAudio && onSwapAudio(postApproveAudioUrl)}>
                ▶ Listen to full episode
              </button>
              {playing.gapId && (
                <button className="play-btn-secondary" onClick={() => { onClose(); onOpenSeries && onOpenSeries(playing.gapId); }}>
                  Open series view
                </button>
              )}
            </div>
          </div>
        )}
        {postApprove === "audio-taking-longer" && (
          <div style={{ padding: "16px", borderRadius: "var(--radius)", background: "rgba(133,79,11,.07)", border: "0.5px solid var(--accent-warm)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6, color: "var(--accent-warm)" }}>⏱ Audio is taking longer than usual</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: 10 }}>
              Generation usually finishes in about 2 minutes but it's been 6. It may still be cooking, or audio generation may have failed. Open the series view to check the latest status, or reload to retry the check.
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {playing.gapId && (
                <button className="play-btn-secondary" onClick={() => { onClose(); onOpenSeries && onOpenSeries(playing.gapId); }}>
                  Open series view →
                </button>
              )}
              <button className="play-btn-secondary" onClick={() => window.location.reload()}>
                Reload
              </button>
            </div>
          </div>
        )}
        {postApprove === "audio-check-failed" && (
          <div style={{ padding: "16px", borderRadius: "var(--radius)", background: "rgba(163,45,45,.07)", border: "0.5px solid var(--red)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6, color: "var(--red)" }}>⚠ Can't check audio status right now</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: 10 }}>
              Couldn't reach the server to check on audio generation — the network may be flaky. The audio may still be cooking; open the series view to verify directly, or reload to retry.
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {playing.gapId && (
                <button className="play-btn-secondary" onClick={() => { onClose(); onOpenSeries && onOpenSeries(playing.gapId); }}>
                  Open series view →
                </button>
              )}
              <button className="play-btn-secondary" onClick={() => window.location.reload()}>
                Reload
              </button>
            </div>
          </div>
        )}
        {postApprove === "audio-check-auth" && (
          <div style={{ padding: "16px", borderRadius: "var(--radius)", background: "rgba(163,45,45,.07)", border: "0.5px solid var(--red)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6, color: "var(--red)" }}>🔑 Your session expired</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: 10 }}>
              Sign in again to check on audio generation. The audio may already be ready — the series view will show its current state once you're signed in.
            </div>
            <button className="play-btn-secondary" onClick={() => window.location.reload()}>
              Sign in / reload
            </button>
          </div>
        )}
        {postApprove === "audio-failed" && (
          <div style={{ padding: "16px", borderRadius: "var(--radius)", background: "rgba(163,45,45,.07)", border: "0.5px solid var(--red)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6, color: "var(--red)" }}>⚠ Audio generation failed</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: 10 }}>
              The full episode couldn't be generated. {postApproveError ? <span style={{ fontStyle: "italic" }}>Reason: {postApproveError}.</span> : null} You can retry — the system will try again with a fresh attempt.
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button className="play-btn" onClick={retryAudio} disabled={retryingAudio}>
                {retryingAudio ? "Restarting…" : "↻ Retry audio"}
              </button>
              {playing.gapId && (
                <button className="play-btn-secondary" onClick={() => { onClose(); onOpenSeries && onOpenSeries(playing.gapId); }}>
                  Open series view
                </button>
              )}
            </div>
          </div>
        )}

        <div className="actions-grid">
          <button className="action-btn" onClick={() => setCaptureOpen("insight")}>
            <div className="action-btn-icon">💡</div><div>Insight</div>
          </button>
          <button className="action-btn" onClick={() => setCaptureOpen("rn")}>
            <div className="action-btn-icon">📝</div><div>Note</div>
          </button>
          <button className="action-btn" onClick={() => setCaptureOpen("oq")}>
            <div className="action-btn-icon">❓</div><div>Question</div>
          </button>
          <button className="action-btn" onClick={() => setCaptureOpen("gap")}>
            <div className="action-btn-icon">🎓</div><div>Learn</div>
          </button>
          <button className="action-btn" onClick={() => setFlagOpen(true)}>
            <div className="action-btn-icon">🚩</div><div>Flag</div>
          </button>
          <button className="action-btn" onClick={shareAudio} aria-label="Share or download audio">
            <div className="action-btn-icon">📤</div><div>Share</div>
          </button>
        </div>
      </div>

      {flagOpen && <FlagSheet moduleId={playing.moduleId} timestamp={Math.round(currentTime)}
        showToast={showToast}
        onClose={() => setFlagOpen(false)}
        onDone={() => { setFlagOpen(false); showToast("Flag saved"); bumpRefresh(); }} />}
      {reactOpen && <ReactSheet moduleId={playing.moduleId}
        showToast={showToast}
        onClose={() => setReactOpen(false)}
        onDone={(msg) => { setReactOpen(false); showToast(msg || "Reaction sent"); bumpRefresh(); }} />}
      {captureOpen && <CaptureSheet kind={captureOpen}
        showToast={showToast}
        sourceInfo={{
          kind: playing.kind,
          moduleId: playing.moduleId,
          articleId: playing.articleId,
          articleTitle: playing.articleTitle,
          title: playing.title,
          timestamp: Math.round(currentTime),
        }}
        onClose={() => setCaptureOpen(null)}
        onDone={(msg) => { setCaptureOpen(null); showToast(msg); bumpRefresh(); }} />}
    </div>
  );
}

// SETTINGS
const THEME_KEY = "spacesc_uc3_theme";
function applyTheme(theme) {
  const root = document.documentElement;
  const t = theme === "system" ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light") : theme;
  if (t === "dark") {
    root.style.setProperty("--bg", "#1a1814");
    root.style.setProperty("--bg-elev", "#252220");
    root.style.setProperty("--bg-sunken", "#2e2a26");
    root.style.setProperty("--ink", "#f1efe8");
    root.style.setProperty("--ink-soft", "#bdb9b0");
    root.style.setProperty("--ink-mute", "#7a766e");
    root.style.setProperty("--line", "#3a3631");
    root.style.setProperty("--line-strong", "#4a4540");
  } else {
    // light (default)
    root.style.removeProperty("--bg");
    root.style.removeProperty("--bg-elev");
    root.style.removeProperty("--bg-sunken");
    root.style.removeProperty("--ink");
    root.style.removeProperty("--ink-soft");
    root.style.removeProperty("--ink-mute");
    root.style.removeProperty("--line");
    root.style.removeProperty("--line-strong");
  }
}

function SettingsScreen({ onClearToken, onTokenUpdated, showToast }) {
  const [tokenInput, setTokenInput] = useState("");
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem(THEME_KEY) || "system"; } catch (_) { return "system"; } });
  const tok = API.getToken();
  const masked = tok ? tok.slice(0, 4) + "•".repeat(Math.max(4, tok.length - 8)) + tok.slice(-4) : "";

  useEffect(() => { applyTheme(theme); try { localStorage.setItem(THEME_KEY, theme); } catch (_) {} }, [theme]);

  const saveToken = () => {
    if (!tokenInput.trim()) return;
    API.setToken(tokenInput.trim());
    setTokenInput("");
    onTokenUpdated && onTokenUpdated();
  };

  const clearCache = () => {
    // Wipe all spacesc_* localStorage keys except the auth token
    try {
      const toRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith("spacesc_") && k !== TOKEN_KEY) toRemove.push(k);
      }
      toRemove.forEach((k) => localStorage.removeItem(k));
      showToast && showToast(`Cleared ${toRemove.length} cache entries`);
    } catch (e) {
      showToast && showToast("Cache clear failed: " + e.message);
    }
  };

  return (
    <div className="page">
      <div className="section first"><div className="section-title">API token</div></div>
      <div className="card">
        <div className="settings-row">
          <div className="settings-label">Current</div>
          <div className="settings-val">{masked || "(not set)"}</div>
          <input className="settings-input" type="password" placeholder="paste new bearer token"
            value={tokenInput} onChange={(e) => setTokenInput(e.target.value)} />
          {tokenInput && <button className="settings-action" onClick={saveToken}>Save new token</button>}
        </div>
        <div className="settings-row">
          <button className="settings-action danger" onClick={onClearToken}>Clear token + sign out</button>
        </div>
      </div>

      <div className="section"><div className="section-title">Appearance</div></div>
      <div className="card">
        <div className="settings-row">
          <div className="settings-label">Theme</div>
          <div className="subtabs" style={{ marginTop: 8, marginBottom: 0 }}>
            <button className={"subtab" + (theme === "light" ? " active" : "")} onClick={() => setTheme("light")}>Light</button>
            <button className={"subtab" + (theme === "dark" ? " active" : "")} onClick={() => setTheme("dark")}>Dark</button>
            <button className={"subtab" + (theme === "system" ? " active" : "")} onClick={() => setTheme("system")}>System</button>
          </div>
        </div>
      </div>

      <div className="section"><div className="section-title">Cache</div></div>
      <div className="card">
        <div className="settings-row">
          <button className="settings-action" onClick={clearCache}>Clear local cache (playback positions, registry)</button>
          <div className="settings-val" style={{ marginTop: 4, color: "var(--ink-mute)", fontSize: 11 }}>Does not log you out.</div>
        </div>
      </div>

      <div className="section"><div className="section-title">About</div></div>
      <div className="card">
        <div className="settings-row">
          <div className="settings-label">Version</div>
          <div className="settings-val">SpaceSC Commute · v5.3</div>
        </div>
        <div className="settings-row">
          <div className="settings-label">Server</div>
          <div className="settings-val">spacesc-mcp.75xnd2784n.workers.dev</div>
        </div>
      </div>
    </div>
  );
}

// Apply theme on initial load from localStorage
try {
  const savedTheme = localStorage.getItem(THEME_KEY) || "system";
  applyTheme(savedTheme);
} catch (_) {}

// APP ROOT
function App() {
  const [authed, setAuthed] = useState(() => API.hasToken());
  const [view, setView] = useState({ name: "home" });
  const [navStack, setNavStack] = useState([]);
  const [tab, setTab] = useState("home");
  const [toast, setToast] = useState(null);
  const [playing, setPlaying] = useState(null);
  const [playerOpen, setPlayerOpen] = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);
  const [preparingAudio, setPreparingAudio] = useState(null); // {msg, sub}
  const [tracked, setTracked] = useState(() => trackingLoad());
  // §commute-queue — the actual play queue for "Start drive". Each item is
  // either a primed playingState or a function () => Promise<playingState>
  // (articles need async cache-then-generate before they're playable).
  // queueIdx points to currently-playing item. Auto-advance fires on onEnded.
  const [commuteQueue, setCommuteQueue] = useState([]);
  const [commuteIdx, setCommuteIdx] = useState(-1);
  // R6.1: expose audio metadata + transport handlers to the OS so iOS lock
  // screen / Control Center / AirPods double-tap drive the player. Without
  // this, lock-screen shows generic audio with no title and no skip controls.
  useEffect(() => {
    if (!playing || typeof navigator === "undefined" || !navigator.mediaSession) return;
    const ms = navigator.mediaSession;
    try {
      ms.metadata = new MediaMetadata({
        title: playing.title || "SpaceSC",
        artist: playing.series || "SpaceSC",
        album: playing.kind === "article" ? "Articles" : playing.kind === "brief" ? "Review briefs" : "Episodes",
      });
    } catch (_) {}
    const safeRun = (fn) => { try { fn(); } catch (_) {} };
    ms.setActionHandler && ms.setActionHandler("play", () => safeRun(() => audioRef.current && audioRef.current.play()));
    ms.setActionHandler && ms.setActionHandler("pause", () => safeRun(() => audioRef.current && audioRef.current.pause()));
    ms.setActionHandler && ms.setActionHandler("seekbackward", (d) => safeRun(() => {
      const a = audioRef.current; if (!a) return;
      a.currentTime = Math.max(0, a.currentTime - ((d && d.seekOffset) || 15));
    }));
    ms.setActionHandler && ms.setActionHandler("seekforward", (d) => safeRun(() => {
      const a = audioRef.current; if (!a) return;
      a.currentTime = Math.min(a.duration || 0, a.currentTime + ((d && d.seekOffset) || 15));
    }));
    ms.setActionHandler && ms.setActionHandler("stop", () => safeRun(stopAudio));
    return () => {
      ["play","pause","seekbackward","seekforward","stop"].forEach(k => {
        try { ms.setActionHandler && ms.setActionHandler(k, null); } catch (_) {}
      });
      try { ms.metadata = null; } catch (_) {}
    };
  }, [playing && playing.moduleId, playing && playing.articleId, playing && playing.title]);

  // R5.3: surface offline state so the user knows API failures are network,
  // not bugs. navigator.onLine is conservative — false only when the browser
  // is confident it has no connection; some flaky tunnels won't trigger.
  const [isOnline, setIsOnline] = useState(() => (typeof navigator !== "undefined" ? navigator.onLine !== false : true));
  useEffect(() => {
    const on = () => setIsOnline(true);
    const off = () => setIsOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);
  const refreshTracked = useCallback(() => setTracked(trackingLoad()), []);
  const untrackGap = useCallback((gap_id) => setTracked(trackingRemove(gap_id)), []);

  // N3 + R5.1: parse window.location.hash AFTER auth lands. Lets the desk
  // open /uc3#mod=NN&t=SS and auto-load the module + seek. Format:
  //   #mod=123&t=45    → play module 123, seek to 45s
  //   #brief=123       → play brief audio for module 123
  useEffect(() => {
    if (!authed) return;
    const h = (typeof window !== "undefined" && window.location && window.location.hash) || "";
    if (!h || h.length < 2) return;
    const params = new URLSearchParams(h.slice(1));
    const modId = params.get("mod");
    const briefId = params.get("brief");
    const tStr = params.get("t");
    const t = tStr ? parseInt(tStr, 10) : 0;
    if (briefId && /^\d+$/.test(briefId)) {
      const id = parseInt(briefId, 10);
      setTimeout(() => playAudio({
        kind: "brief", moduleId: id, audioUrl: API.briefAudioUrl(id),
        title: "Brief " + id, series: "Deep-linked",
        voiceId: null,
      }, t || 0), 0);
    } else if (modId && /^\d+$/.test(modId)) {
      const id = parseInt(modId, 10);
      setTimeout(() => playAudio({
        kind: "module", moduleId: id, audioUrl: API.moduleAudioUrl(id),
        title: "Module " + id, series: t ? "Deep-linked at " + fmtTime(t) : "Deep-linked",
        voiceId: null,
      }, t || 0), 0);
    }
  }, [authed]);
  const audioRef = useRef(null);
  const blobUrlRef = useRef(null);

  const showToast = useCallback((msg) => {
    setToast({ id: Date.now(), msg });
    setTimeout(() => setToast(null), 2400);
  }, []);

  const navTo = useCallback((next) => {
    setNavStack((s) => [...s, view]);
    setView(next);
  }, [view]);

  const navBack = useCallback(() => {
    setNavStack((s) => {
      if (s.length === 0) { setView({ name: tab }); return s; }
      const prev = s[s.length - 1];
      setView(prev);
      return s.slice(0, -1);
    });
  }, [tab]);

  const navToTab = useCallback((tabName) => {
    setTab(tabName);
    setView({ name: tabName });
    setNavStack([]);
  }, []);

  const bumpRefresh = useCallback(() => {
    setRefreshKey((k) => k + 1);
    // D4: re-read tracked gaps from localStorage so a new capture surfaces
    // its banner immediately after the sheet closes.
    setTracked(trackingLoad());
  }, []);

  function playAudio(playingState, seekTo) {
    // Revoke any previous blob URL — prevents leak when switching from
    // article (blob URL) to module/brief (direct URL) or between articles.
    if (blobUrlRef.current && blobUrlRef.current !== playingState.audioUrl) {
      try { URL.revokeObjectURL(blobUrlRef.current); } catch (_) {}
      blobUrlRef.current = null;
    }
    setPlaying(playingState);
    setPlayerOpen(true);
    if (seekTo) {
      setTimeout(() => { if (audioRef.current) audioRef.current.currentTime = seekTo; }, 100);
    }
  }

  function stopAudio() {
    if (audioRef.current) { try { audioRef.current.pause(); } catch (_) {} }
    if (blobUrlRef.current) { try { URL.revokeObjectURL(blobUrlRef.current); } catch (_) {} blobUrlRef.current = null; }
    setPlaying(null);
    setPlayerOpen(false);
    // §commute-queue — stopping clears the queue so the user isn't surprised
    // by next item starting after they stopped.
    setCommuteQueue([]);
    setCommuteIdx(-1);
  }

  // §archive — hide a module/series from the queue and stop further work on it
  async function archiveModule(moduleId, title) {
    try {
      const r = await API.archiveModule(moduleId);
      if (r.ok) {
        showToast(`Archived "${truncate(title || ("module " + moduleId), 40)}" — no more work scheduled`);
        bumpRefresh();
      } else {
        showToast("Couldn't archive: " + (r.error || "unknown"));
      }
    } catch (e) { showToast("Couldn't archive: " + e.message); }
  }
  async function archiveSeries(gapId, title) {
    if (!confirm(`Archive the whole series "${truncate(title || gapId, 50)}"? All episodes will be hidden and no more work will run on them. (You can un-archive later.)`)) return;
    try {
      const r = await API.archiveSeries(gapId);
      if (r.ok) {
        showToast(`Archived series · ${(r.result && r.result.modules_archived) || 0} episodes hidden`);
        bumpRefresh();
      } else {
        showToast("Couldn't archive series: " + (r.error || "unknown"));
      }
    } catch (e) { showToast("Couldn't archive series: " + e.message); }
  }

  // §commute-queue — build a play queue from everything the home screen lists
  // and play items in sequence, full content each. onEnded calls
  // advanceCommuteQueue which moves to the next item. Stops cleanly when done.
  function startCommuteDrive({ articles, briefsReady, due }) {
    const queue = [];
    // Order: articles first (warm-up), then briefs (decisions), then due re-listens (deep)
    for (const a of (articles || [])) queue.push({ kind: "article", article: a });
    for (const b of (briefsReady || [])) queue.push({ kind: "brief", brief: b });
    for (const d of (due || [])) queue.push({ kind: "due", item: d });
    if (queue.length === 0) {
      showToast && showToast("Nothing queued to play");
      return;
    }
    setCommuteQueue(queue);
    setCommuteIdx(0);
    playCommuteIndex(queue, 0);
  }

  function playCommuteIndex(queue, idx) {
    if (idx < 0 || idx >= queue.length) {
      // End of queue
      setCommuteQueue([]);
      setCommuteIdx(-1);
      showToast && showToast("Drive complete");
      return;
    }
    const item = queue[idx];
    const pos = ` (${idx + 1}/${queue.length})`;
    if (item.kind === "article") {
      // Async — playArticle handles its own state via playAudio internally.
      playArticle(item.article, pos).catch((e) => {
        console.error("commute-queue article failed:", e);
        // Don't get stuck — skip to next
        setCommuteIdx(idx + 1);
        playCommuteIndex(queue, idx + 1);
      });
    } else if (item.kind === "brief") {
      const b = item.brief;
      playAudio({
        kind: "brief", moduleId: b.moduleId, audioUrl: API.briefAudioUrl(b.moduleId),
        title: b.title + pos, series: b.series, voiceId: b.voiceId,
        gapId: b.gapId, position: b.position, totalPositions: b.totalPositions,
        _commute: true,
      });
    } else if (item.kind === "due") {
      const d = item.item;
      playAudio({
        kind: "module-due", moduleId: d.module_id, audioUrl: API.moduleAudioUrl(d.module_id),
        title: truncate(d.learning_objective, 80) + pos, series: "Due for re-listen",
        voiceId: null, isDue: true, _commute: true,
      });
    }
  }

  function advanceCommuteQueue() {
    if (commuteIdx < 0 || commuteQueue.length === 0) return false;
    const nextIdx = commuteIdx + 1;
    if (nextIdx >= commuteQueue.length) {
      setCommuteQueue([]);
      setCommuteIdx(-1);
      return false;
    }
    setCommuteIdx(nextIdx);
    playCommuteIndex(commuteQueue, nextIdx);
    return true;
  }

  // Article playback: cache-then-generate, then play blob URL.
  async function playArticle(a, posLabel) {
    const articleVoice = pickVoiceFor(a.page_id);
    const sourceLabel = a.source_newsletter || a.source_email ||
      (a.article_url ? new URL(a.article_url).hostname.replace(/^www\./, "") : "Article");
    setPreparingAudio({ msg: "Preparing article audio…" + (posLabel || ""), sub: "Checking cache and generating if needed. ~10-30 seconds first time; instant after." });
    try {
      // 1. Try cache first
      let blob = null;
      try { blob = await API.getCachedAudioBlob(a.page_id); } catch (_) { blob = null; }
      // 2. If miss, fetch full article body and generate TTS
      if (!blob) {
        setPreparingAudio({ msg: "Fetching article…", sub: "Pulling the full body from Notion." });
        const article = await API.getArticle(a.page_id);
        const text = article.full_text || article.blurb || a.title || "";
        if (!text || text.length < 50) {
          throw new Error("article body too short to play (got " + text.length + " chars)");
        }
        setPreparingAudio({ msg: "Generating audio…", sub: "ElevenLabs TTS · usually 20-30 seconds." });
        blob = await API.generateAudioBlob(text, articleVoice);
        // Fire-and-forget cache for next time
        API.cacheAudioBlob(a.page_id, blob).catch(() => {});
      }
      // 3. Create blob URL, free any previous one
      if (blobUrlRef.current) { try { URL.revokeObjectURL(blobUrlRef.current); } catch (_) {} }
      const url = URL.createObjectURL(blob);
      blobUrlRef.current = url;
      setPreparingAudio(null);
      playAudio({
        kind: "article",
        articleId: a.page_id,
        moduleId: null,
        articleTitle: a.title,
        audioUrl: url,
        title: truncate(a.title, 80) + (posLabel || ""),
        series: sourceLabel,
        voiceId: articleVoice,
        _commute: !!posLabel,
      });
    } catch (e) {
      setPreparingAudio(null);
      showToast("Couldn't prepare article: " + e.message);
      // §commute-queue — don't get stuck. If we're in a drive, advance past this item.
      if (posLabel) advanceCommuteQueue();
    }
  }

  if (!authed) return <LoginPage onSaved={() => setAuthed(true)} />;

  let viewEl = null;
  if (view.name === "home") {
    viewEl = <HomeScreen
      refreshKey={refreshKey}
      tracked={tracked}
      onUntrack={untrackGap}
      onRetry={bumpRefresh}
      onPlayDailyBriefing={(briefing) => playAudio({
        kind: "daily-briefing",
        moduleId: null,
        audioUrl: API.briefingAudioUrl(briefing.briefing_date),
        title: "Today's briefing",
        series: new Date(briefing.briefing_date + "T00:00:00Z").toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" }),
        voiceId: briefing.voice_id,
      })}
      onRegenerateBriefing={async () => {
        showToast("Regenerating today's briefing…");
        try {
          await API._post("/api/uc3/daily-briefing-generate", { async: true });
          setTimeout(() => bumpRefresh(), 1000);
        } catch (e) {
          showToast("Couldn't restart: " + e.message);
        }
      }}
      onOpenSeries={(gapId, gapTitle) => navTo({ name: "series", gapId, gapTitle })}
      onPlayDue={(item) => playAudio({
        kind: "module-due", moduleId: item.module_id, audioUrl: API.moduleAudioUrl(item.module_id),
        title: truncate(item.learning_objective, 80), series: "Due for re-listen",
        voiceId: null, isDue: true,
      })}
      onPlayBrief={(modId, title, series, voiceId, gapId, pos, total) => playAudio({
        kind: "brief", moduleId: modId, audioUrl: API.briefAudioUrl(modId),
        title, series, voiceId, gapId, position: pos, totalPositions: total,
      })}
      onPlayArticle={playArticle}
      onPickFromLibrary={() => navToTab("library")}
      onStartDrive={startCommuteDrive}
      onArchiveModule={archiveModule}
      onArchiveSeries={archiveSeries}
    />;
  } else if (view.name === "library") {
    viewEl = <LibraryScreen refreshKey={refreshKey}
      onOpenSeries={(gapId, gapTitle) => navTo({ name: "series", gapId, gapTitle })}
      onPlayArticle={playArticle}
      onArchiveSeries={archiveSeries}
      initialSubTab={view.subTab || "articles"} />;
  } else if (view.name === "captures") {
    viewEl = <CapturesScreen refreshKey={refreshKey}
      onJump={(moduleId, ts) => playAudio({
        kind: "module", moduleId, audioUrl: API.moduleAudioUrl(moduleId),
        title: "Module " + moduleId, series: "Flagged at " + fmtTime(ts), voiceId: null,
      }, ts)} />;
  } else if (view.name === "series") {
    viewEl = <SeriesScreen gapId={view.gapId} gapTitle={view.gapTitle} refreshKey={refreshKey}
      onPlayBrief={(modId, title, voiceId, pos, total) => playAudio({
        kind: "brief", moduleId: modId, audioUrl: API.briefAudioUrl(modId),
        title, series: view.gapTitle, voiceId, gapId: view.gapId, position: pos, totalPositions: total,
      })}
      onPlayModule={(modId, title, voiceId, pos, total) => playAudio({
        kind: "module", moduleId: modId, audioUrl: API.moduleAudioUrl(modId),
        title, series: view.gapTitle, voiceId, gapId: view.gapId, position: pos, totalPositions: total,
      })}
      showToast={showToast}
      onRegenerate={async (modId, voiceId) => {
        // §voice-fix-3: regenerate-in-voice handler. Brief regen is sync
        // (~30-60s); we fire-and-forget on the UI and rely on the series
        // polling loop to surface the new audio. For approved modules,
        // also queue the full-audio regen so the episode aligns to voice.
        showToast(`Regenerating in ${voiceName(voiceId)}… ~1 min`);
        // Don't await — let it run in the background. The polling loop in
        // SeriesScreen catches the result. If the call fails (e.g. quota),
        // the audio_last_error will surface in the card on next poll.
        API.regenerateModuleAudio(modId).then(
          () => { showToast("Brief regenerated"); bumpRefresh(); },
          (e) => {
            const msg = (e && e.message) || "regenerate failed";
            if (/quota_exceeded|quota of \d+/i.test(msg)) {
              showToast("⚠ TTS quota exhausted — see error in episode card");
            } else if (/timeout/i.test(msg)) {
              showToast("Still working — refresh in a minute");
            } else {
              showToast("Regenerate failed: " + msg.slice(0, 80));
            }
            bumpRefresh();
          },
        );
        // Also queue the full-audio regen (no-op if module isn't approved yet).
        API.regenerateFullAudio(modId).catch(() => {});
      }} />;
  } else if (view.name === "settings") {
    viewEl = <SettingsScreen
      onClearToken={() => { API.clearToken(); setAuthed(false); }}
      onTokenUpdated={() => showToast("Token saved")}
      showToast={showToast} />;
  }

  return (
    <div className="app">
      {/* R5.3: offline banner — sticky top, shows only when the browser is
          confident there's no connection. Apple-bar default. */}
      {!isOnline && (
        <div role="status" aria-live="polite" style={{ position: "sticky", top: 0, zIndex: 70, padding: "8px 12px", background: "rgba(133,79,11,.95)", color: "#fff", fontSize: 12, fontWeight: 500, textAlign: "center", borderBottom: "0.5px solid var(--accent-warm)" }}>
          ⚠ You're offline — we'll resume when you're back online.
        </div>
      )}
      {/* Nav menu pill — always visible top-right */}
      <NavMenu />

      {view.name === "series" ? (
        <div className="topbar">
          <button className="topbar-back" onClick={navBack} aria-label="Back">←</button>
          <div className="topbar-title">{view.gapTitle || "Series"}</div>
        </div>
      ) : view.name === "settings" ? (
        <div className="topbar">
          <button className="topbar-back" onClick={() => navToTab("home")} aria-label="Close">×</button>
          <div className="topbar-title">Settings</div>
        </div>
      ) : (
        <div className="topbar">
          <div className="topbar-title">
            {view.name === "home" && "Today's drive"}
            {view.name === "library" && "Library"}
            {view.name === "captures" && "Captures"}
          </div>
          <button className="topbar-gear" onClick={bumpRefresh} aria-label="Refresh">↻</button>
          <button className="topbar-gear" onClick={() => navTo({ name: "settings" })} aria-label="Settings">⚙</button>
        </div>
      )}

      {viewEl}

      {view.name !== "settings" && (
        <div className="tabbar">
          <button className={"tab" + (tab === "home" ? " active" : "")} onClick={() => navToTab("home")}>
            <div className="tab-icon">🏠</div><div>Today</div>
          </button>
          <button className={"tab" + (tab === "library" ? " active" : "")} onClick={() => navToTab("library")}>
            <div className="tab-icon">📚</div><div>Library</div>
          </button>
          <button className={"tab" + (tab === "captures" ? " active" : "")} onClick={() => navToTab("captures")}>
            <div className="tab-icon">💭</div><div>Captures</div>
          </button>
        </div>
      )}

      {playing && !playerOpen && (
        <MiniPlayer playing={playing} audioRef={audioRef}
          onExpand={() => setPlayerOpen(true)}
          onStop={stopAudio} />
      )}

      {playing && playerOpen && (
        <PlayerOverlay playing={playing} audioRef={audioRef}
          onClose={() => setPlayerOpen(false)}
          onEnded={() => {
            if (playing.isDue) {
              API.markListened(playing.moduleId).then(() => showToast("Marked as listened")).catch(() => {});
            }
          }}
          onOpenSeries={(gapId) => navTo({ name: "series", gapId, gapTitle: playing.series })}
          onSwapAudio={(newUrl) => {
            // Swap the current player from brief to full episode in place
            playAudio({
              ...playing,
              kind: "module",
              audioUrl: newUrl,
              title: playing.title,
            });
          }}
          commuteQueue={commuteQueue}
          commuteIdx={commuteIdx}
          onSkipNext={advanceCommuteQueue}
          showToast={showToast} bumpRefresh={bumpRefresh} />
      )}

      {playing && (
        <audio
          ref={audioRef}
          src={playing.audioUrl}
          autoPlay
          onCanPlay={(e) => {
            // iOS Safari requires a user gesture; explicit play() with catch
            const p = e.currentTarget.play();
            if (p && p.catch) p.catch(() => {
              // Autoplay blocked; show a toast guiding user to tap the player
              showToast("Tap ▶ in the player to start audio");
              setPlayerOpen(true);
            });
          }}
          onEnded={() => {
            if (playing.kind === "article" && playing.articleId) {
              API.markArticleListened(playing.articleId)
                .then(() => showToast("Article marked Listened"))
                .catch(() => {});
            }
            if (playing.isDue && playing.moduleId) {
              API.markListened(playing.moduleId).catch(() => {});
            }
            // §commute-queue — auto-advance through the queue if we're driving.
            if (playing._commute) {
              setTimeout(() => advanceCommuteQueue(), 500);
            }
          }}
          onError={() => {
            // Audio failed to load (e.g. flagged-claim jump on a module without full audio)
            showToast("Audio not ready for this item — try again later.");
            stopAudio();
          }}
        />
      )}

      {/* Preparing-audio overlay (article TTS generation) */}
      {preparingAudio && (
        <div className="prep-overlay">
          <div className="prep-icon">🎙</div>
          <div className="prep-msg">{preparingAudio.msg}</div>
          <div className="prep-sub">{preparingAudio.sub}</div>
          <div className="spinner"></div>
          {/* R7.1: escape hatch — background work continues + caches for
              next time, but the user gets the UI back. */}
          <button className="play-btn-secondary" onClick={() => setPreparingAudio(null)} style={{ marginTop: 10 }}>
            Cancel
          </button>
        </div>
      )}

      {toast && <div className="toast" role="status" aria-live="polite">{toast.msg}</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
