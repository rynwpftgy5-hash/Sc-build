<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpaceSC Commute</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf9f5">
<style>
:root {
  --bg: #faf9f5;
  --bg-elev: #ffffff;
  --bg-sunken: #f1efe8;
  --ink: #1f1d18;
  --ink-soft: #56544c;
  --ink-mute: #888780;
  --line: #e7e5dc;
  --line-strong: #d4d1c4;
  --accent: #185fa5;
  --accent-warm: #854f0b;
  --green: #3b6d11;
  --red: #a32d2d;
  --purple: #534ab7;
  --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-rise: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 10px;
  --radius-lg: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  font-size: 15px; line-height: 1.4;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  overscroll-behavior-y: contain;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }

.app { max-width: 720px; margin: 0 auto; min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 40;
  background: var(--bg);
  border-bottom: 0.5px solid var(--line);
  padding: 12px 18px;
  display: flex; align-items: center; gap: 12px;
}
.topbar-back { font-size: 22px; padding: 4px 8px; margin-left: -8px; color: var(--ink-soft); }
.topbar-title { font-size: 17px; font-weight: 600; flex: 1; line-height: 1.25; }
.topbar-gear { font-size: 22px; padding: 4px 8px; margin-right: -8px; color: var(--ink-soft); }

.page { padding: 16px 18px 140px; }

.section { margin: 24px 0 10px; display: flex; align-items: baseline; gap: 10px; }
.section-icon { font-size: 16px; }
.section-title { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-soft); }
.section-meta { font-size: 12px; color: var(--ink-mute); margin-left: auto; }
.section + .section { margin-top: 28px; }
.section.first { margin-top: 4px; }

.card {
  background: var(--bg-elev);
  border: 0.5px solid var(--line);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  overflow: hidden;
}
.card-tap { cursor: pointer; }
.card-tap:active { background: var(--bg-sunken); }
.card-tap:hover { border-color: var(--line-strong); }

.row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
}
.row + .row { border-top: 0.5px solid var(--line); }
.row-main { flex: 1; min-width: 0; }
.row-title { font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.row-sub { font-size: 13px; color: var(--ink-soft); margin-top: 3px; line-height: 1.35; }
.row-meta { font-size: 12px; color: var(--ink-mute); margin-top: 4px; }
.row-chevron { color: var(--ink-mute); font-size: 16px; flex-shrink: 0; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 12px;
  font-size: 11px; font-weight: 500;
  border: 0.5px solid;
}
.badge-ok    { color: var(--green);  border-color: var(--green);  background: rgba(59,109,17,.07); }
.badge-warn  { color: var(--accent-warm); border-color: var(--accent-warm); background: rgba(133,79,11,.07); }
.badge-busy  { color: var(--purple); border-color: var(--purple); background: rgba(83,74,183,.07); }
.badge-bad   { color: var(--red);    border-color: var(--red);    background: rgba(163,45,45,.07); }
.badge-due   { color: var(--red);    border-color: var(--red);    background: rgba(163,45,45,.07); }
.badge-muted { color: var(--ink-mute); border-color: var(--line-strong); background: var(--bg-sunken); }

.play-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 999px;
  background: var(--ink); color: var(--bg-elev);
  font-size: 14px; font-weight: 500;
  border: none;
}
.play-btn[disabled] {
  background: var(--bg-sunken); color: var(--ink-mute); cursor: default;
}

.play-btn-secondary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 999px;
  background: var(--bg-sunken); color: var(--ink);
  font-size: 13px; font-weight: 500;
  border: 0.5px solid var(--line);
}
.play-btn-secondary[disabled] { color: var(--ink-mute); }

.module-actions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 14px; }

.state-line { font-size: 13px; color: var(--ink-soft); padding: 0 16px 14px; line-height: 1.4; }
.state-line.pulse::before {
  content: "●"; color: var(--purple); margin-right: 6px;
  animation: pulse 1.5s infinite ease-in-out;
}
@keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }

.empty {
  text-align: center; padding: 40px 24px; color: var(--ink-mute);
  font-size: 14px; line-height: 1.6;
}
.empty-icon { font-size: 28px; margin-bottom: 12px; opacity: .5; }

.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-elev);
  border-top: 0.5px solid var(--line);
  display: flex;
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
  z-index: 50;
  max-width: 720px; margin: 0 auto;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 4px; color: var(--ink-mute); font-size: 11px;
  border: none; background: none;
}
.tab-icon { font-size: 20px; }
.tab.active { color: var(--accent); }

.mini-player {
  position: fixed; left: 0; right: 0;
  bottom: calc(58px + env(safe-area-inset-bottom));
  background: var(--bg-elev);
  border-top: 0.5px solid var(--line);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  z-index: 49;
  max-width: 720px; margin: 0 auto;
  box-shadow: var(--shadow-rise);
}
.mini-info { flex: 1; min-width: 0; cursor: pointer; }
.mini-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-sub { font-size: 11px; color: var(--ink-mute); }
.mini-btn { font-size: 22px; padding: 4px 10px; color: var(--ink); }

.player-overlay {
  position: fixed; inset: 0; z-index: 60;
  background: var(--bg);
  display: flex; flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.player-head {
  display: flex; align-items: center;
  padding: 14px 18px;
  border-bottom: 0.5px solid var(--line);
}
.player-head-close { font-size: 22px; color: var(--ink-soft); padding: 4px 10px; margin-left: -10px; }
.player-head-title { flex: 1; text-align: center; font-size: 13px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.04em; text-transform: uppercase; }
.player-body { flex: 1; padding: 24px 24px 60px; display: flex; flex-direction: column; gap: 22px; }

.player-meta { text-align: center; }
.player-kind { font-size: 12px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }
.player-title { font-size: 20px; font-weight: 600; margin-top: 6px; line-height: 1.3; }
.player-series { font-size: 14px; color: var(--ink-soft); margin-top: 6px; }
.player-voice { font-size: 12px; color: var(--ink-mute); margin-top: 8px; }

.scrubber-wrap { display: flex; flex-direction: column; gap: 8px; }
.scrubber { width: 100%; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; cursor: pointer; }
.scrubber-fill { height: 100%; background: var(--ink); transition: width .1s linear; }
.times { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-mute); }

.transport { display: flex; align-items: center; justify-content: center; gap: 32px; padding: 8px 0; }
.transport-skip { font-size: 26px; color: var(--ink-soft); padding: 10px; }
.transport-play {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--ink); color: var(--bg-elev);
  font-size: 28px; display: inline-flex; align-items: center; justify-content: center;
}

.actions-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  padding: 4px 0;
}
.action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 4px;
  background: var(--bg-elev); border: 0.5px solid var(--line); border-radius: var(--radius);
  font-size: 10px; color: var(--ink-soft); line-height: 1.2;
  text-align: center;
}
.action-btn:active { background: var(--bg-sunken); }
.action-btn-icon { font-size: 22px; }

.verdict-row { display: flex; gap: 10px; padding: 4px 0; }
.verdict-approve {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 16px; border-radius: var(--radius);
  background: var(--green); color: white; font-size: 16px; font-weight: 600;
}
.verdict-approve[disabled] { background: var(--bg-sunken); color: var(--ink-mute); }
.verdict-react {
  width: 56px; display: flex; align-items: center; justify-content: center;
  padding: 16px; border-radius: var(--radius);
  background: var(--bg-elev); border: 0.5px solid var(--line);
  font-size: 22px;
}

.sheet-backdrop {
  position: fixed; inset: 0; z-index: 70;
  background: rgba(31,29,24,0.4);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 12px;
  animation: fade-in .2s;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
.sheet {
  background: var(--bg-elev);
  border-radius: 20px;
  max-width: 720px; width: 100%;
  padding: 20px 22px 28px;
  max-height: 80vh; overflow-y: auto;
  animation: slide-up .25s ease-out;
  margin-bottom: env(safe-area-inset-bottom);
}
@keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.sheet-handle { width: 36px; height: 4px; background: var(--line-strong); border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.sheet-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; line-height: 1.45; }
.sheet-input {
  width: 100%; padding: 12px 14px; border-radius: var(--radius);
  background: var(--bg-sunken); border: 0.5px solid var(--line);
  font-size: 15px; resize: vertical; min-height: 96px;
}
.sheet-input:focus { outline: 1.5px solid var(--accent); }
.sheet-buttons { display: flex; gap: 10px; margin-top: 16px; }
.sheet-btn-primary {
  flex: 1; padding: 14px; border-radius: var(--radius);
  background: var(--ink); color: var(--bg-elev);
  font-size: 15px; font-weight: 600;
}
.sheet-btn-primary[disabled] { background: var(--bg-sunken); color: var(--ink-mute); }
.sheet-btn-secondary {
  padding: 14px 20px; border-radius: var(--radius);
  background: var(--bg-sunken); border: 0.5px solid var(--line);
  font-size: 15px;
}
.sheet-status { font-size: 13px; color: var(--ink-soft); padding: 10px 0; line-height: 1.5; }
.sheet-record-btn {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--red); color: white;
  font-size: 28px; display: inline-flex; align-items: center; justify-content: center;
  margin: 8px auto;
}
.sheet-record-btn.recording { animation: pulse 1.1s infinite ease-in-out; }
.sheet-record-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 12px 0; }
.sheet-record-hint { font-size: 13px; color: var(--ink-mute); }

.toast {
  position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--bg-elev);
  padding: 12px 20px; border-radius: 999px; font-size: 14px;
  z-index: 100; box-shadow: var(--shadow-rise);
  max-width: 90%; text-align: center;
  animation: toast-in .2s;
}
@keyframes toast-in { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

.login-page { padding: 60px 24px; text-align: center; }
.login-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.login-sub { font-size: 14px; color: var(--ink-soft); margin-bottom: 28px; }
.login-input {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--bg-elev); border: 0.5px solid var(--line);
  font-size: 14px; font-family: ui-monospace, monospace;
}
.login-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  background: var(--ink); color: var(--bg-elev);
  font-size: 15px; font-weight: 600; margin-top: 12px;
}

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--line); border-top-color: var(--ink);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.queue-tile {
  background: var(--ink); color: var(--bg-elev);
  border-radius: var(--radius-lg);
  padding: 22px 22px 18px;
  margin-bottom: 10px;
}
.queue-label { font-size: 11px; opacity: .65; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.queue-title { font-size: 22px; font-weight: 600; margin-bottom: 14px; line-height: 1.25; }
.queue-line { font-size: 13px; opacity: .85; margin-bottom: 18px; }
.queue-buttons { display: flex; gap: 10px; }
.queue-play {
  flex: 1; padding: 14px;
  background: var(--bg-elev); color: var(--ink);
  border-radius: var(--radius); font-size: 15px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}

.settings-row { padding: 14px 16px; }
.settings-row + .settings-row { border-top: 0.5px solid var(--line); }
.settings-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.settings-val { font-family: ui-monospace, monospace; font-size: 13px; color: var(--ink-soft); }
.settings-input { width: 100%; padding: 10px 12px; border-radius: 8px; background: var(--bg-sunken); border: 0.5px solid var(--line); font-family: ui-monospace, monospace; font-size: 13px; margin-top: 8px; }
.settings-action { color: var(--accent); font-size: 14px; padding: 8px 0; background: none; border: none; }
.settings-action.danger { color: var(--red); }

/* Nav pill (top-right, jump to other SpaceSC surfaces) */
.nav-pill {
  position: fixed;
  top: max(10px, env(safe-area-inset-top));
  right: max(10px, env(safe-area-inset-right));
  z-index: 80;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 12px 7px 10px;
  background: var(--bg-elev); border: 0.5px solid var(--line);
  border-radius: 999px; box-shadow: var(--shadow);
  font-size: 12px; font-weight: 600; color: var(--ink);
}
.nav-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink); }
.nav-pill-chev { font-size: 10px; color: var(--ink-mute); transition: transform .2s; }
.nav-pill.open .nav-pill-chev { transform: rotate(180deg); }
.nav-backdrop { position: fixed; inset: 0; background: rgba(31,29,24,0.18); z-index: 79; }
.nav-menu {
  position: fixed; top: max(54px, calc(env(safe-area-inset-top) + 44px)); right: max(10px, env(safe-area-inset-right));
  z-index: 80; width: min(280px, calc(100vw - 20px));
  background: var(--bg-elev); border: 0.5px solid var(--line); border-radius: 14px;
  box-shadow: 0 10px 30px rgba(31,29,24,0.18); overflow: hidden;
  animation: slide-up .18s ease-out;
}
.nav-menu-header { padding: 10px 14px 8px; border-bottom: 0.5px solid var(--line); font-size: 10px; font-weight: 700; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
.nav-menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; text-decoration: none; color: var(--ink);
  border-bottom: 0.5px solid var(--line);
}
.nav-menu-item:last-child { border-bottom: none; }
.nav-menu-item.active { background: var(--ink); color: var(--bg-elev); }
.nav-menu-icon { font-size: 18px; flex-shrink: 0; width: 26px; text-align: center; }
.nav-menu-text { flex: 1; min-width: 0; }
.nav-menu-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.nav-menu-desc { font-size: 11px; color: var(--ink-mute); margin-top: 1px; }
.nav-menu-item.active .nav-menu-desc { color: rgba(250,249,245,0.7); }
.nav-menu-arrow { color: var(--ink-mute); font-size: 12px; }

/* Library subtabs (Articles | Series) */
.subtabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-sunken); border-radius: 999px; margin-bottom: 14px; }
.subtab { flex: 1; padding: 8px 12px; border-radius: 999px; font-size: 13px; font-weight: 500; color: var(--ink-soft); background: none; border: none; }
.subtab.active { background: var(--bg-elev); color: var(--ink); box-shadow: var(--shadow); }

/* Article-specific row (in queue / library) */
.article-row-priority { font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
.article-row-source { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.article-row-domain-chips { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.chip { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; background: var(--bg-sunken); color: var(--ink-soft); border: 0.5px solid var(--line); }
.chip.priority-1 { color: var(--red); border-color: var(--red); background: rgba(163,45,45,.07); }

/* "Preparing audio" overlay for article playback */
.prep-overlay {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(250,249,245,0.96);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 24px; text-align: center;
}
.prep-icon { font-size: 36px; opacity: .6; }
.prep-msg { font-size: 16px; font-weight: 500; }
.prep-sub { font-size: 13px; color: var(--ink-soft); max-width: 320px; line-height: 1.5; }

/* Capture-type deep-link rows */
.capture-link {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
}
.capture-link-icon { font-size: 22px; }
.capture-link-text { flex: 1; }
.capture-link-name { font-size: 14px; font-weight: 500; }
.capture-link-desc { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }
.capture-link-arrow { color: var(--ink-mute); font-size: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// API LAYER
const BASE = "https://spacesc-mcp.75xnd2784n.workers.dev";
const TOKEN_KEY = "spacesc_mcp_token";

const API = {
  getToken: () => { try { return localStorage.getItem(TOKEN_KEY) || ""; } catch (_) { return ""; } },
  setToken: (t) => { try { localStorage.setItem(TOKEN_KEY, t); } catch (_) {} },
  clearToken: () => { try { localStorage.removeItem(TOKEN_KEY); } catch (_) {} },
  hasToken: () => !!API.getToken(),

  async _readBody(r) {
    // Helper: read body once; try JSON, fall back to text
    try {
      const txt = await r.text();
      try { return { json: JSON.parse(txt), text: txt }; } catch (_) { return { json: null, text: txt }; }
    } catch (_) { return { json: null, text: "" }; }
  },

  async _get(path, opts) {
    const t = API.getToken();
    if (!t) throw Object.assign(new Error("no token"), { code: "NO_TOKEN" });
    const timeout = (opts && opts.timeout) || 30000;
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), timeout);
    try {
      const r = await fetch(BASE + path, { headers: { Authorization: "Bearer " + t }, signal: ctrl.signal });
      clearTimeout(tid);
      if (r.status === 401 || r.status === 403) throw Object.assign(new Error("unauthorized"), { code: "AUTH" });
      if (!r.ok) {
        const b = await API._readBody(r);
        const msg = "HTTP " + r.status + (b.text ? ": " + b.text.slice(0, 200) : "");
        throw Object.assign(new Error(msg), { code: "HTTP_" + r.status, body: b.text, jsonBody: b.json });
      }
      return r.json();
    } catch (e) {
      clearTimeout(tid);
      if (e.name === "AbortError") throw Object.assign(new Error("timeout"), { code: "TIMEOUT" });
      throw e;
    }
  },

  async _post(path, body, opts) {
    const t = API.getToken();
    if (!t) throw Object.assign(new Error("no token"), { code: "NO_TOKEN" });
    const timeout = (opts && opts.timeout) || 30000;
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), timeout);
    try {
      const r = await fetch(BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + t },
        body: JSON.stringify(body || {}),
        signal: ctrl.signal,
      });
      clearTimeout(tid);
      if (r.status === 401 || r.status === 403) throw Object.assign(new Error("unauthorized"), { code: "AUTH" });
      if (r.status === 207) { const j = await r.json(); j._partial = true; return j; }
      if (!r.ok) {
        const b = await API._readBody(r);
        const msg = "HTTP " + r.status + (b.text ? ": " + b.text.slice(0, 200) : "");
        throw Object.assign(new Error(msg), { code: "HTTP_" + r.status, body: b.text, jsonBody: b.json });
      }
      return r.json();
    } catch (e) {
      clearTimeout(tid);
      if (e.name === "AbortError") throw Object.assign(new Error("timeout"), { code: "TIMEOUT" });
      throw e;
    }
  },

  listGaps: () => API._get("/api/uc3/list-gaps"),

  // §8.4a.11 / v5.1 — Articles (Reading Parking Lot)
  listArticles: (filter) => API._post("/api/parking-lot-list", filter || { status_filter: ["Retrieved"], sort: "priority_then_email", limit: 50 }),

  markArticleSkip: (page_id) => API._post("/api/parking-lot-update", { page_id, properties: { Status: "Skip" } }),

  // TTS cache (auth-gated; have to fetch with bearer then create blob URL for <audio>)
  async getCachedAudioBlob(page_id) {
    const t = API.getToken();
    const r = await fetch(BASE + "/api/tts-cache/" + encodeURIComponent(page_id), {

    });
    if (r.status === 404) return null;
    if (!r.ok) throw new Error("cache fetch HTTP " + r.status);

  },
  async generateAudioBlob(text, voice_id, model_id) {
    const t = API.getToken();
    const r = await fetch(BASE + "/api/tts-chunked", {

    await fetch(BASE + "/api/tts-cache/" + encodeURIComponent(page_id), {

// Pick a deterministic rotation voice from a stable string key (e.g. page_id).
// Used for content that has no position concept (articles).
const pickVoiceFor = (key) => {
  let h = 0;
  for (let i = 0; i < (key || "").length; i++) h = ((h << 5) - h + key.charCodeAt(i)) | 0;
  return VOICE_IDS[Math.abs(h) % VOICE_IDS.length];
};
// F14 fix: mirror server-side pickVoiceForPosition (worker/src/lib/voice-rotation.ts)
// exactly so display labels match the audio actually rendered for that position.
// Previously the module card fell back to the hash-based pickVoiceFor on the
// stringified position, which diverges from the server (e.g. position 4 hashed
// to Adam but server uses Bella) — the user then saw "Read by Adam" on a card
// whose audio is Bella's voice.
const pickVoiceIdForPosition = (position) => {
  const p = position && position > 0 ? position : 1;
  return VOICE_IDS[(p - 1) % VOICE_IDS.length];
};

const fmtTime = (s) => {
  if (!s || !Number.isFinite(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + String(sec).padStart(2, "0");
};

const truncate = (s, n) => {
  if (!s) return "";
  if (s.length <= n) return s;
  return s.slice(0, n).replace(/[,;:.\s]+\S*$/, "") + "…";
};

const timeAgo = (unix) => {
  if (!unix) return "";
  const diff = (Date.now() / 1000) - unix;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
  if (diff < 86400 * 7) return Math.floor(diff / 86400) + "d ago";
  return new Date(unix * 1000).toLocaleDateString();
};

// D4: pipeline-tracking surface. When a user captures a learning gap mid-
// commute, we persist a small tracking record locally so HomeScreen can show
// "your new series is building · N of M briefs ready" until the first brief
// lands. Survives reload; auto-prunes after 24h or when the series is whole.
const TRACKING_KEY = "spacesc_tracking_gaps";
const trackingLoad = () => {
  try {
    const raw = localStorage.getItem(TRACKING_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return [];
    const cutoff = (Date.now() / 1000) - 86400;
    return arr.filter(r => r && r.gap_id && (r.started_at || 0) >= cutoff);
  } catch (_) { return []; }
};
const trackingSave = (arr) => {
  try { localStorage.setItem(TRACKING_KEY, JSON.stringify(arr || [])); } catch (_) {}
};
const trackingAdd = (gap_id, title) => {
  const arr = trackingLoad();
  if (arr.find(r => r.gap_id === gap_id)) return arr;
  const next = [...arr, { gap_id, title: title || "(new series)", started_at: Math.floor(Date.now() / 1000) }];
  trackingSave(next);
  return next;
};
const trackingRemove = (gap_id) => {
  const next = trackingLoad().filter(r => r.gap_id !== gap_id);
  trackingSave(next);
  return next;
};

// Item 4: pending-capture queue. Mirror of trackingAdd/Remove/Load but for
// capture items the user just submitted, so CapturesScreen can render them
// before the server-side write + refetch lands. Items prune automatically
// once they match a server item (by content prefix) or after 24h either way.
const PENDING_CAPTURES_KEY = "spacesc_pending_captures";
const pendingLoad = () => {
  try {
    const raw = localStorage.getItem(PENDING_CAPTURES_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return [];
    const cutoff = (Date.now() / 1000) - 86400;
    return arr.filter(r => r && r.local_id && (r.created_at || 0) >= cutoff);
  } catch (_) { return []; }
};
const pendingSave = (arr) => {
  try { localStorage.setItem(PENDING_CAPTURES_KEY, JSON.stringify(arr || [])); } catch (_) {}
};
const pendingAdd = (type, content) => {
  const arr = pendingLoad();
  const next = [...arr, {
    local_id: "local-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8),
    type, content: (content || "").trim(),
    created_at: Math.floor(Date.now() / 1000),
  }];
  pendingSave(next);
  return next;
};
const pendingPrune = (serverItems) => {
  // Remove pending entries whose content prefix appears in any server item
  // of the same type. Server items typically have richer / truncated content
  // so we compare against the first 60 chars normalized.
  const norm = (s) => (s || "").replace(/\s+/g, " ").trim().toLowerCase().slice(0, 60);
  const serverFingerprints = new Set((serverItems || []).map(s => s.type + "|" + norm(s.content)));
  const current = pendingLoad();
  const next = current.filter(p => !serverFingerprints.has(p.type + "|" + norm(p.content)));
  if (next.length !== current.length) pendingSave(next);
  return next;
};

// D5: estimate audio duration in seconds from MP3 byte count. ElevenLabs
// eleven_multilingual_v2 outputs ~128 kbps mp3 (16 KB/s). Approximation is
// accurate to within a few seconds, which is plenty for queue UI.

const fmtMin = (s) => (s == null) ? "" : Math.max(1, Math.round(s / 60)) + " min";

// LOGIN
function LoginPage({ onSaved, initialError }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState(initialError || null);
  const [verifying, setVerifying] = useState(false);

  const tryToken = async () => {
    if (!val.trim()) return;
    setVerifying(true);
    setErr(null);
    API.setToken(val.trim());
    try {
      // Sanity-check the token by hitting list-gaps (cheap auth probe)
      await API.listGaps();
      onSaved();
    } catch (e) {
      if (e.code === "AUTH" || (e.message && e.message.includes("401"))) {
        API.clearToken();
        setErr("Token rejected. Paste the right one.");
      } else {
        // Network or server issue — accept the token but warn the user so
        // they don't think the empty main app is silently broken.
        setErr("Saved, but couldn't reach the server. Check your network or try again — you'll land on the home screen anyway.");
        setTimeout(() => onSaved(), 1200);
      }
      setVerifying(false);
    }
  };

  return (
    <div className="app">
      <div className="login-page">
        <div className="login-title">SpaceSC Commute</div>
        <div className="login-sub">Paste your bearer token to begin.</div>
        <input
          className="login-input" type="password" placeholder="bearer token"
          value={val} onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") tryToken(); }}
          autoFocus
        />
        {err && <div style={{ color: "var(--red)", fontSize: 13, marginTop: 10 }}>{err}</div>}
        <button className="login-btn" onClick={tryToken} disabled={verifying}>
          {verifying ? "Verifying…" : "Save"}
        </button>
      </div>
    </div>
  );
}

// D4 — TrackingBanner: shows build progress for a freshly-captured Learning
// Gap. Polls pipeline-status every 25s. Auto-dismisses once the first brief
// is playable; user can dismiss manually anytime.
function TrackingBanner({ record, onPlayBrief, onOpenSeries, onDismiss }) {
  const [state, setState] = useState({ phase: "loading", modules: [], gapTitle: record.title });

  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      try {
        const r = await API.pipelineStatus(record.gap_id);
        if (cancelled) return;
        const mods = (r.modules || []);
        const briefReady = mods.find(m => m.review_brief && m.review_brief.audio_r2_key);
        const pipelineStatus = (r.pipeline && r.pipeline.status) || "running";
        setState({
          phase: briefReady ? "first-brief-ready" : (mods.length === 0 ? "queued" : "cooking"),
          modules: mods,
          briefReady,
          pipelineStatus,
          totalModules: mods.length,
          briefsReady: mods.filter(m => m.review_brief && m.review_brief.audio_r2_key).length,
          gapTitle: r.gap_title || record.title,
        });
      } catch (e) {
        if (!cancelled) setState((s) => ({ ...s, phase: "error", error: e.message }));
      }
    };
    poll();
    const t = setInterval(poll, 25_000);
    return () => { cancelled = true; clearInterval(t); };
  }, [record.gap_id]);

  const dismiss = () => onDismiss(record.gap_id);

  // Cap visible age in the banner — if the pipeline has been running >15min
  // without a brief yet, switch copy to "this is taking longer than usual".
  const ageMin = Math.round((Date.now() / 1000 - record.started_at) / 60);
  const TAKING_LONGER_MIN = 30; // pipeline E2E wall is ~28 min per system-map

  if (state.phase === "first-brief-ready" && state.briefReady) {
    const m = state.briefReady;
    return (
      <div style={{ padding: "16px", margin: "0 0 14px 0", borderRadius: "var(--radius)", background: "rgba(59,109,17,.08)", border: "0.5px solid var(--green)" }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: "var(--green)", marginBottom: 4 }}>🆕 First brief is ready</div>
            <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5 }}>
              {state.gapTitle} · {state.briefsReady} of {state.totalModules || "?"} briefs ready
            </div>
          </div>
          <button onClick={dismiss} style={{ background: "none", border: "none", fontSize: 18, color: "var(--ink-mute)", cursor: "pointer" }} aria-label="Dismiss tracker">×</button>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
          <button className="play-btn" onClick={() => onPlayBrief(m, state.gapTitle, state.totalModules)}>
            ▶ Listen now
          </button>
          <button className="play-btn-secondary" onClick={() => { dismiss(); onOpenSeries(record.gap_id, state.gapTitle); }}>
            Open series
          </button>
        </div>
      </div>
    );
  }

  const taking = ageMin > TAKING_LONGER_MIN;
  return (
    <div style={{ padding: "14px 16px", margin: "0 0 14px 0", borderRadius: "var(--radius)", background: "var(--bg-sunken)", border: "0.5px solid var(--line-strong)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div className="spinner" style={{ flexShrink: 0 }}></div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, fontWeight: 500 }}>
            {taking ? "Still building" : "Building your new series"}
          </div>
          <div style={{ fontSize: 12, color: "var(--ink-soft)", marginTop: 2 }}>
            {truncate(state.gapTitle, 80)}
            {state.totalModules ? ` · ${state.briefsReady} of ${state.totalModules} briefs ready` : taking ? ` · started ${ageMin}m ago` : " · usually takes ~5 minutes"}
          </div>
          {state.phase === "error" && <div style={{ fontSize: 11, color: "var(--red)", marginTop: 2 }}>Couldn't check status — will keep trying</div>}
        </div>
        <button onClick={dismiss} style={{ background: "none", border: "none", fontSize: 18, color: "var(--ink-mute)", cursor: "pointer" }} aria-label="Dismiss tracker">×</button>
      </div>
    </div>
  );
}

// HOME
function HomeScreen({ refreshKey, tracked, onPlayBrief, onOpenSeries, onPlayDue, onPlayArticle, onPickFromLibrary, onUntrack, onRetry, onPlayDailyBriefing, onRegenerateBriefing, onStartDrive, onArchiveModule, onArchiveSeries }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [gaps, setGaps] = useState([]);
  const [due, setDue] = useState([]);
  const [briefsReady, setBriefsReady] = useState([]);
  const [articles, setArticles] = useState([]);
  // Item 2E: today's daily briefing, if generated. 404 means nothing today yet.
  const [todayBriefing, setTodayBriefing] = useState(null);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    // D6: single batched call for brief-ready modules replaces the
    // N-round-trip pipelineStatus loop that ran 1× per gap.
    // Item 2E: also fetch today's daily briefing in parallel (404 → null).
    Promise.all([
      API.listGaps().catch(e => ({ _err: e })),
      API.spacedRepDue().catch(e => ({ _err: e })),
      API.listArticles({ status_filter: ["Retrieved"], sort: "priority_then_email", limit: 10 }).catch(e => ({ _err: e })),
      API.listBriefsReady().catch(e => ({ _err: e })),
      API.todayBriefing().catch(e => ({ _err: e })),
    ]).then(([gapsRes, dueRes, articlesRes, briefsRes, briefingRes]) => {
      if (cancelled) return;
      if (gapsRes._err) { setError(gapsRes._err.message); setLoading(false); return; }
      const allGaps = (gapsRes.result && gapsRes.result.gaps) || [];
      const real = allGaps.filter(g => !isLegacyGap(g));
      setGaps(real);
      setDue((dueRes.result && dueRes.result.due) || []);
      if (!articlesRes._err) setArticles(articlesRes.rows || []);

      const rawBriefs = (briefsRes && briefsRes.result && briefsRes.result.briefs) || [];
      const briefList = rawBriefs
        .filter(b => !isLegacyGap({ gap_title: b.gap_title || "" }))
        .slice(0, 6)
        .map(b => ({
          moduleId: b.module_id,
          title: truncate(b.learning_objective, 80),
          voiceId: b.voice_id,
          series: b.gap_title,
          gapId: b.gap_id,
          position: b.position,
          totalPositions: b.total_in_series,
          durationSec: audioSecondsFromBytes(b.brief_audio_bytes),
        }));
      setBriefsReady(briefList);
      // Item 2E: today's briefing row (any non-error status — ready, generating,
      // or failed). Tile renderer handles each state distinctly so generation
      // failures don't disappear silently (F14 lesson).
      const briefingRow = briefingRes && !briefingRes._err && briefingRes.result
        ? briefingRes.result
        : null;
      setTodayBriefing(briefingRow);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [refreshKey]);

  // B6: auto-poll while the briefing is mid-generation so the user doesn't
  // have to manually refresh to see it flip to 'ready'. Same pattern as N2.
  useEffect(() => {
    if (!todayBriefing || todayBriefing.status !== "generating") return;
    let cancelled = false;
    const t = setInterval(() => {
      API.todayBriefing()
        .then((r) => { if (!cancelled && r && r.result) setTodayBriefing(r.result); })
        .catch(() => {});
    }, 30_000);
    return () => { cancelled = true; clearInterval(t); };
  }, [todayBriefing && todayBriefing.status]);

  if (loading) return <div className="page"><div className="empty"><div className="empty-icon">⏳</div>Loading your day…</div></div>;
  if (error) {
    const isAuth = /unauthorized|401|403|no token/i.test(error);
    return (
      <div className="page">
        <div className="empty">
          <div className="empty-icon">⚠</div>
          Couldn't load: {error}
          <br/>
          {isAuth ? "Open Settings to paste a fresh token." : "Try again in a moment — the server may be slow."}
          <div style={{ marginTop: 14, display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
            <button className="play-btn-secondary" onClick={onRetry}>↻ Retry</button>
            {isAuth ? null : <button className="play-btn-secondary" onClick={() => window.location.reload()}>Reload page</button>}
          </div>
        </div>
      </div>
    );
  }

  const queueLength = briefsReady.length + due.length + articles.length;
  // D5: real durations for briefs (from audio_bytes); rough estimates for
  // due re-listens and articles since neither carries duration metadata yet.
  const briefSec = briefsReady.reduce((acc, b) => acc + (b.durationSec || 300), 0);
  const queueSec = briefSec + (due.length * 600) + (articles.length * 360);
  const queueMin = Math.round(queueSec / 60);

  return (
    <div className="page">
      {/* Item 2E: today's auto-assembled audio briefing — when ready, sits
          above everything else as the first thing Campbell sees in the morning.
          Three states surface distinctly (F14: never silent on failure). */}
      {todayBriefing && todayBriefing.status === "ready" && todayBriefing.audio_r2_key && (
        <div className="card card-tap" style={{ marginBottom: 12, borderColor: "var(--accent)", background: "linear-gradient(135deg, rgba(24,95,165,0.06), rgba(24,95,165,0.02))" }}
             onClick={() => onPlayDailyBriefing && onPlayDailyBriefing(todayBriefing)}>
          <div className="row">
            <div className="row-main">
              <div className="row-title">🌅 Today's briefing</div>
              <div className="row-sub">
                {todayBriefing.audio_bytes ? fmtMin(audioSecondsFromBytes(todayBriefing.audio_bytes)) : "~5 min"}
                {todayBriefing.source_summary && typeof todayBriefing.source_summary === "object"
                  ? ` · ${todayBriefing.source_summary.ingest_count || 0} new items synthesized`
                  : ""}
              </div>
              <div className="row-meta">Read by {voiceName(todayBriefing.voice_id)}</div>
            </div>
            <button className="play-btn" aria-label="Play today's briefing">▶</button>
          </div>
        </div>
      )}
      {todayBriefing && todayBriefing.status === "generating" && (
        <div className="card" style={{ marginBottom: 12, background: "var(--bg-sunken)", borderColor: "var(--line-strong)" }}>
          <div className="row">
            <div className="spinner" style={{ flexShrink: 0, marginLeft: 4 }}></div>
            <div className="row-main">
              <div className="row-title">🌅 Today's briefing is being assembled</div>
              <div className="row-sub">Synthesizing overnight changes · usually ready in a few minutes</div>
            </div>
          </div>
        </div>
      )}
      {todayBriefing && todayBriefing.status === "failed" && (
        <div className="card" style={{ marginBottom: 12, background: "rgba(163,45,45,.06)", borderColor: "var(--red)" }}>
          <div className="row">
            <div className="row-main">
              <div className="row-title" style={{ color: "var(--red)" }}>⚠ Today's briefing couldn't be assembled</div>
              <div className="row-sub">{todayBriefing.last_error ? `Reason: ${truncate(todayBriefing.last_error, 100)}` : "Something went wrong overnight."}</div>
              <div style={{ marginTop: 10 }}>
                <button className="play-btn-secondary" onClick={() => onRegenerateBriefing && onRegenerateBriefing()}>
                  ↻ Try regenerating
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* D4: tracking banners for in-flight learning gap pipelines */}
      {(tracked || []).map((rec) => (
        <TrackingBanner
          key={rec.gap_id}
          record={rec}
          onPlayBrief={(m, gapTitle, total) => onPlayBrief(m.id, truncate(m.learning_objective, 80), gapTitle, m.review_brief && m.review_brief.voice_id, rec.gap_id, m.position, total)}
          onOpenSeries={onOpenSeries}
          onDismiss={onUntrack}
        />
      ))}
      {queueLength > 0 ? (
        <div className="queue-tile">
          <div className="queue-label">Today's drive</div>
          <div className="queue-title">
            {[
              articles.length > 0 && `${articles.length} article${articles.length === 1 ? "" : "s"}`,
              briefsReady.length > 0 && `${briefsReady.length} brief${briefsReady.length === 1 ? "" : "s"}`,
              due.length > 0 && `${due.length} re-listen${due.length === 1 ? "" : "s"}`,
            ].filter(Boolean).join(" · ")}
          </div>
          <div className="queue-line">~{queueMin} min total</div>
          <div className="queue-buttons">
            <button className="queue-play" onClick={() => onStartDrive && onStartDrive({ articles, briefsReady, due })}>▶ Start drive</button>
            <button className="queue-play" style={{ background: "transparent", color: "var(--bg-elev)", border: "0.5px solid rgba(255,255,255,0.3)" }} onClick={onPickFromLibrary}>
              📋 Pick from library
            </button>
          </div>
        </div>
      ) : (
        <div className="empty">
          <div className="empty-icon">🚗</div>
          Nothing queued for today. Capture a learning gap from the desk or wait for new ingests.
        </div>
      )}

      {articles.length > 0 && (
        <>
          <div className="section first">
            <div className="section-icon">📰</div>
            <div className="section-title">Articles to listen</div>
            <div className="section-meta">{articles.length}</div>
          </div>
          {articles.map((a) => <ArticleRow key={a.page_id} a={a} onPlay={onPlayArticle} />)}
        </>
      )}

      {briefsReady.length > 0 && (
        <>
          <div className={articles.length === 0 ? "section first" : "section"}>
            <div className="section-icon">🆕</div>
            <div className="section-title">Briefs waiting for your verdict</div>
            <div className="section-meta">{briefsReady.length}</div>
          </div>
          {briefsReady.map((b) => (
            <div key={b.moduleId} className="card">
              <div className="row" onClick={() => onPlayBrief(b.moduleId, b.title, b.series, b.voiceId, b.gapId, b.position, b.totalPositions)} style={{ cursor: "pointer" }}>
                <div className="row-main">
                  <div className="row-title">{b.title}</div>
                  <div className="row-sub">{b.series} · Episode {b.position} of {b.totalPositions}</div>
                  <div className="row-meta">Brief · {b.durationSec ? fmtMin(b.durationSec) : "~5 min"} · Read by {voiceName(b.voiceId)}</div>
                </div>
                <button className="play-btn" aria-label={"Play brief: " + b.title}>▶ Brief</button>
              </div>
              <div style={{ padding: "6px 14px 10px", borderTop: "0.5px solid var(--line)", display: "flex", justifyContent: "flex-end", gap: 8 }}>
                <button className="play-btn-secondary" style={{ fontSize: 11, padding: "4px 10px", color: "var(--ink-mute)" }}
                  onClick={(e) => { e.stopPropagation(); onArchiveModule && onArchiveModule(b.moduleId, b.title); }}
                  title="Hide this brief from your queue and stop further work on it">
                  🗄 Archive
                </button>
              </div>
            </div>
          ))}
        </>
      )}

      {due.length > 0 && (
        <>
          <div className="section">
            <div className="section-icon">🔴</div>
            <div className="section-title">Due for re-listen</div>
            <div className="section-meta">{due.length}</div>
          </div>
          {due.map((d) => (
            <div key={d.id} className="card card-tap" onClick={() => onPlayDue(d)}>
              <div className="row">
                <div className="row-main">
                  <div className="row-title">{truncate(d.learning_objective, 80)}</div>
                  <div className="row-sub">Cadence {d.cadence} · due {timeAgo(d.due_at)}</div>
                </div>
                <button className="play-btn" aria-label={"Play due re-listen: " + truncate(d.learning_objective, 60)}>▶</button>
              </div>
            </div>
          ))}
        </>
      )}

      <div className="section">
        <div className="section-icon">📚</div>
        <div className="section-title">All series</div>
        <div className="section-meta">{gaps.length}</div>
      </div>
      {gaps.slice(0, 3).map((g) => (
        <SeriesCard key={g.gap_id} g={g} onClick={() => onOpenSeries(g.gap_id, g.gap_title)} onArchive={onArchiveSeries} />
      ))}
      {gaps.length > 3 && (
        <div style={{ textAlign: "center", marginTop: 10 }}>
          <button className="play-btn-secondary" onClick={onPickFromLibrary}>
            See all {gaps.length} series →
          </button>
        </div>
      )}
    </div>
  );
}

// LIBRARY (with Articles | Series subtabs)
function LibraryScreen({ refreshKey, onOpenSeries, onPlayArticle, initialSubTab, onArchiveSeries }) {
  const [subTab, setSubTab] = useState(initialSubTab || "articles");
  const [loading, setLoading] = useState(true);
  const [gaps, setGaps] = useState([]);
  const [articles, setArticles] = useState([]);
  const [statusFilter, setStatusFilter] = useState("Retrieved");
  const [showLegacy, setShowLegacy] = useState(false);
  const [error, setError] = useState(null);
  const [query, setQuery] = useState("");

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    if (subTab === "series") {
      API.listGaps()
        .then((r) => { if (cancelled) return; setGaps((r.result && r.result.gaps) || []); setLoading(false); })
        .catch((e) => { if (!cancelled) { setError(e.message); setLoading(false); } });
    } else {
      API.listArticles({ status_filter: [statusFilter], sort: "priority_then_email", limit: 60 })
        .then((r) => { if (cancelled) return; setArticles(r.rows || []); setLoading(false); })
        .catch((e) => { if (!cancelled) { setError(e.message); setLoading(false); } });
    }
    return () => { cancelled = true; };
  }, [refreshKey, subTab, statusFilter]);

  const real = gaps.filter(g => !isLegacyGap(g));
  const legacy = gaps.filter(isLegacyGap);
  // R9.1: client-side text search. Articles match against title +
  // source_newsletter + source_email + domain + topics. Series match
  // against gap_title + first_module_objective.
  const q = query.trim().toLowerCase();
  const inText = (s) => (typeof s === "string" ? s.toLowerCase().includes(q) : false);
  const filteredArticles = !q ? articles : articles.filter(a =>
    inText(a.title) || inText(a.source_newsletter) || inText(a.source_email) ||
    (Array.isArray(a.domain) && a.domain.some(d => inText(d))) ||
    (Array.isArray(a.topics) && a.topics.some(t => inText(t)))
  );
  const baseSeries = showLegacy ? gaps : real;
  const filteredSeries = !q ? baseSeries : baseSeries.filter(g =>
    inText(g.gap_title) || inText(g.first_module_objective)
  );
  const shownSeries = filteredSeries;

  return (
    <div className="page">
      <div className="subtabs">
        <button className={"subtab" + (subTab === "articles" ? " active" : "")} onClick={() => setSubTab("articles")}>📰 Articles</button>
        <button className={"subtab" + (subTab === "series" ? " active" : "")} onClick={() => setSubTab("series")}>🎓 Series</button>
      </div>
      <input
        type="search"
        value={query}
        onChange={(e) => setQuery(e.target.value)}
        placeholder={subTab === "articles" ? "Search title, source, domain, topic…" : "Search series title…"}
        aria-label="Search library"
        style={{ width: "100%", padding: "10px 14px", borderRadius: 999, border: "0.5px solid var(--line)", background: "var(--bg-sunken)", fontSize: 14, marginBottom: 14, color: "var(--ink)" }}
      />

      {loading ? <div className="empty"><div className="spinner"></div></div>
       : error ? <div className="empty">⚠ {error}</div>
       : subTab === "articles" ? (
        <>
          <div className="subtabs" style={{ marginBottom: 14 }}>
            {[
              { value: "Retrieved", label: "Queued" },
              { value: "Listened",  label: "Listened" },
              { value: "New",       label: "New" },
              { value: "Ingest",    label: "To ingest" },
            ].map((s) => (
              <button key={s.value} className={"subtab" + (statusFilter === s.value ? " active" : "")} onClick={() => setStatusFilter(s.value)}>{s.label}</button>
            ))}
          </div>
          {filteredArticles.length === 0 ? (
            <div className="empty"><div className="empty-icon">📰</div>{q ? "No articles match \"" + query + "\"." : "No articles with status \"" + statusFilter + "\"."}</div>
          ) : (
            filteredArticles.map((a) => <ArticleRow key={a.page_id} a={a} onPlay={onPlayArticle} />)
          )}
        </>
      ) : (
        <>
          {shownSeries.length === 0 ? (
            <div className="empty"><div className="empty-icon">🎓</div>No series yet. Capture a learning gap to start one.</div>
          ) : (
            <>
              <div className="section first">
                <div className="section-icon">🎓</div>
                <div className="section-title">Your series</div>
                <div className="section-meta">{shownSeries.length}</div>
              </div>
              {shownSeries.map((g) => (
                <SeriesCard key={g.gap_id} g={g} onClick={() => onOpenSeries(g.gap_id, g.gap_title)} onArchive={onArchiveSeries} />
              ))}
              {legacy.length > 0 && (
                <div style={{ marginTop: 18, textAlign: "center" }}>
                  <button className="play-btn-secondary" onClick={() => setShowLegacy(!showLegacy)}>
                    {showLegacy ? `Hide ${legacy.length} older` : `Show ${legacy.length} older series`}
                  </button>
                </div>
              )}
            </>
          )}
        </>
      )}
    </div>
  );
}

// MODULE CARD
function ModuleCard({ m, totalPositions, onPlayBrief, onPlayModule, onRegenerate, showToast }) {
  const state = moduleUserState(m);
  const briefAvail = !!(m.review_brief && m.review_brief.audio_r2_key);
  const fullAvail = !!m.audio_r2_key;
  // §voice-fix-2: prefer module.voice_id (the rotation-assigned voice) over
  // brief.voice_id (which can be stale on pre-rotation modules where the
  // brief was generated with the W6 default). Falls back to brief voice_id,
  // then position-based rotation pick if neither is set.
  const voiceId = m.voice_id
    || (m.review_brief && m.review_brief.voice_id)
    || pickVoiceIdForPosition(m.position);
  const briefVoiceId = m.review_brief && m.review_brief.voice_id;
  // Flag a divergence so the user can see when brief audio was generated in
  // a different voice than the module's current voice_id. Happens for
  // pre-rotation modules where the brief is in Antoni but voice_id is now
  // the rotation pick (e.g. Rachel for pos 2). The Regenerate button below
  // lets the user resolve the mismatch.
  const voiceMismatch = briefVoiceId && m.voice_id && briefVoiceId !== m.voice_id;
  const [regenerating, setRegenerating] = React.useState(false);
  const handleRegen = async () => {
    if (!onRegenerate) return;
    setRegenerating(true);
    try { await onRegenerate(m.id, voiceId); }
    catch (e) { showToast && showToast("Regenerate failed: " + e.message); }
    finally { setRegenerating(false); }
  };

  let stateLine = null, badge = null;
  switch (state) {
    case "cooking":
      badge = <span className="badge badge-busy">generating</span>;
      stateLine = <div className="state-line pulse">Episode being generated. The brief will appear here when ready.</div>;
      break;
    case "brief-ready":
      badge = <span className="badge badge-warn">brief ready</span>;
      stateLine = <div className="state-line">Listen to the brief, then approve to unlock the full episode.</div>;
      break;
    case "audio-cooking":
      badge = <span className="badge badge-busy">audio coming</span>;
      stateLine = <div className="state-line pulse">Approved. Full audio is generating — about 2 minutes.</div>;
      break;
    case "ready":
      badge = <span className="badge badge-ok">ready</span>;
      break;
    default:
      // F8 mitigation: surface the real upstream status with plain-English
      // copy and a "what now" line, rather than a bare "unknown" grey.
      if (m.status === "revision-requested") {
        badge = <span className="badge badge-warn">needs revision</span>;
        stateLine = <div className="state-line">Your feedback is being applied to this episode. It'll move back to "brief ready" when the rewrite is done.</div>;
      } else if (m.status === "failed" || m.status === "error") {
        badge = <span className="badge badge-bad">build failed</span>;
        stateLine = <div className="state-line">Something went wrong building this episode. Try voice-reacting "rebuild" or check the pipeline page.</div>;
      } else {
        badge = <span className="badge badge-muted">{m.status || "unknown"}</span>;
        stateLine = <div className="state-line">This episode is in an unrecognized state. Check the pipeline page for details.</div>;
      }
  }

  return (
    <div className="card">
      <div className="row">
        <div className="row-main">
          <div className="row-title">{m.learning_objective}</div>
          <div className="row-sub">Episode {m.position} of {totalPositions} · Read by {voiceName(voiceId)}{voiceMismatch && <span style={{ color: "var(--accent-warm)", marginLeft: 8 }}> · brief in {voiceName(briefVoiceId)} (regenerate to align)</span>}</div>
        </div>
        {badge}
      </div>
      {stateLine}
      {/* §voice-fix-4: surface audio_last_error so quota/auth/upstream failures
          stop being invisible. Without this the user sees an endless
          "audio coming…" with no signal that the queue retry is failing on
          every attempt. Pattern-matches the most common errors to plain English. */}
      {m.audio_last_error && (() => {
        const err = m.audio_last_error;
        let humanMsg = err.slice(0, 200);
        if (/quota_exceeded|exceeds your quota|credits remaining/i.test(err)) {
          humanMsg = "ElevenLabs TTS quota exhausted. Top up the plan at elevenlabs.io to resume audio generation.";
        } else if (/401|unauthorized|invalid_api_key/i.test(err)) {
          humanMsg = "ElevenLabs auth failed. The API key may need rotation.";
        }
        return (
          <div style={{ marginTop: 8, padding: "8px 12px", background: "rgba(255,180,100,0.08)", borderLeft: "3px solid var(--accent-warm)", borderRadius: 4, fontSize: 12, color: "var(--ink-soft)", lineHeight: 1.4 }}>
            <strong style={{ color: "var(--accent-warm)" }}>⚠ Audio generation failed</strong>
            <div style={{ marginTop: 4 }}>{humanMsg}</div>
            {m.audio_attempts_count > 1 && (
              <div style={{ marginTop: 4, fontSize: 11, opacity: 0.7 }}>{m.audio_attempts_count} attempts · last {timeAgo(m.audio_last_attempt_at)}</div>
            )}
          </div>
        );
      })()}
      <div className="module-actions">
        {briefAvail ? (
          <button className="play-btn-secondary" onClick={onPlayBrief}>▶ Brief · ~5m</button>
        ) : (
          <button className="play-btn-secondary" disabled>🎙 Brief generating…</button>
        )}
        {fullAvail ? (
          <button className="play-btn" onClick={onPlayModule}>▶ Episode · ~10m</button>
        ) : state === "audio-cooking" ? (
          <button className="play-btn" disabled>⏳ Audio coming…</button>
        ) : state === "brief-ready" ? (
          <button className="play-btn" disabled>🔒 Approve to unlock</button>
        ) : (
          <button className="play-btn" disabled>—</button>
        )}
        {/* §voice-fix-3: per-module regenerate-in-voice. Async via queue so it
            doesn't block; user can keep working. Shows the target voice so the
            action is honest about what'll change. */}
        {(briefAvail || fullAvail) && onRegenerate && (
          <button className="play-btn-secondary" onClick={handleRegen} disabled={regenerating} title="Regenerate the full episode audio in the current rotation voice">
            {regenerating ? "Queuing…" : `🔄 Regenerate in ${voiceName(voiceId)}`}
          </button>
        )}
      </div>
    </div>
  );
}

// SERIES DETAIL
function SeriesScreen({ gapId, gapTitle, refreshKey, onPlayBrief, onPlayModule, onRegenerate, showToast }) {
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    API.pipelineStatus(gapId).then((r) => { if (cancelled) return; setData(r); setLoading(false); })
      .catch((e) => { if (!cancelled) { setError(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [gapId, refreshKey]);

  // N2: while any module is mid-cook (cooking | audio-cooking | needs revision)
  // OR brief audio for any module isn't yet rendered, re-fetch pipeline-status
  // every 25s so the user doesn't need to reload to see progress.
  useEffect(() => {
    if (!data) return;
    const mods = data.modules || [];
    const anyCooking = mods.some(m => {
      const st = moduleUserState(m);
      return st === "cooking" || st === "audio-cooking";
    });
    if (!anyCooking) return;
    let cancelled = false;
    const t = setInterval(() => {
      API.pipelineStatus(gapId).then((r) => { if (!cancelled) setData(r); }).catch(() => {});
    }, 25_000);
    return () => { cancelled = true; clearInterval(t); };
  }, [gapId, data]);

  if (loading) return <div className="page"><div className="empty"><div className="spinner"></div></div></div>;
  if (error) return <div className="page"><div className="empty">⚠ {error}</div></div>;
  if (!data) return null;

  const mods = data.modules || [];
  const total = mods.length;
  const approved = mods.filter(m => m.status === "approved").length;
  const fullAudioReady = mods.filter(m => m.audio_r2_key).length;
  const startedTs = data.pipeline && data.pipeline.started_at;

  return (
    <div className="page">
      <div className="section first"><div className="section-title">Series state</div></div>
      <div className="card" style={{ padding: 16 }}>
        <div style={{ fontSize: 14, color: "var(--ink-soft)", lineHeight: 1.5 }}>
          <strong>{total} episodes</strong>
          {` · ${approved} approved · ${fullAudioReady} ready to listen`}
          {fullAudioReady === total && total > 0 && (
            <span style={{ color: "var(--green)", marginLeft: 6 }}>· all set for your drive</span>
          )}
          {approved > fullAudioReady && (
            <span style={{ color: "var(--accent-warm)", marginLeft: 6 }}>· {approved - fullAudioReady} audio still generating</span>
          )}
        </div>
      </div>

      {/* "Where this came from" — gap origin context */}
      <div className="section"><div className="section-title">Where this came from</div></div>
      <div className="card" style={{ padding: 16 }}>
        <div style={{ fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5 }}>
          <div><strong>Captured:</strong> {startedTs ? timeAgo(startedTs) + " (" + new Date(startedTs * 1000).toLocaleDateString() + ")" : "—"}</div>
          <div style={{ marginTop: 8 }}>
            {/* D3: deep-link to the specific gap row when notion_page_id is
                available; fall back to the whole queue otherwise. */}
            {data.notion_page_id ? (
              <a href={"https://www.notion.so/" + String(data.notion_page_id).replace(/-/g, "")} target="_blank" style={{ color: "var(--accent)", fontSize: 13 }}>
                Open this gap in Notion →
              </a>
            ) : (
              <a href={NOTION_LINKS.gaps} target="_blank" style={{ color: "var(--accent)", fontSize: 13 }}>
                Open the Learning Gaps Queue in Notion →
              </a>
            )}
          </div>
        </div>
      </div>

      <div className="section"><div className="section-title">Episodes</div></div>
      {mods.map((m) => (
        <ModuleCard
          key={m.id} m={m} totalPositions={total}
          onPlayBrief={() => onPlayBrief(m.id, truncate(m.learning_objective, 80), m.voice_id || (m.review_brief && m.review_brief.voice_id), m.position, total)}
          onPlayModule={() => onPlayModule(m.id, truncate(m.learning_objective, 80), m.voice_id || (m.review_brief && m.review_brief.voice_id), m.position, total)}
          onRegenerate={onRegenerate}
          showToast={showToast}
        />
      ))}
    </div>
  );
}

function CapturesScreen({ refreshKey, onJump }) {
  const [loading, setLoading] = useState(true);
  const [items, setItems] = useState([]);
  const [counts, setCounts] = useState({ errata: 0, gap: 0, oq: 0, insight: 0, rn: 0 });
  const [error, setError] = useState(null);
  // Item 4B: pending list — items the user just captured locally that the
  // server hasn't confirmed yet. Re-read from localStorage on every refresh
  // so newly-submitted entries surface immediately.
  const [pending, setPending] = useState(() => pendingLoad());

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    // Pull the latest local pending queue every refresh — a sheet submit
    // may have happened since the last mount.
    setPending(pendingLoad());
    API.capturesToday()
      .then((r) => {
        if (cancelled) return;
        const res = (r && r.result) || {};
        const serverItems = res.items || [];
        setItems(serverItems);
        setCounts(res.counts || { errata: 0, gap: 0, oq: 0, insight: 0, rn: 0 });
        // Prune any local pending that now matches a server item (by
        // type + first-60-chars-normalized fingerprint). Keep the rest as
        // still-syncing, with the 24h auto-expiry built into pendingLoad.
        setPending(pendingPrune(serverItems));
        setLoading(false);
      })
      .catch((e) => { if (!cancelled) { setError(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [refreshKey]);

  // Item 4B: merge server + pending into a single chronological timeline.
  // Pending items render with a "syncing…" badge and are non-clickable until
  // their server-side copy lands.
  const mergedItems = [
    ...items,
    ...pending.map(p => ({
      type: p.type,
      id: p.local_id,
      content: p.content,
      created_at: p.created_at,
      _pending: true,
    })),
  ].sort((a, b) => (b.created_at || 0) - (a.created_at || 0));

  return (
    <div className="page">

      <div className="section first">

      {loading ? <div className="empty"><div className="spinner"></div></div>

         <div className="empty">
           ⚠ {error}
           <div style={{ marginTop: 12 }}>
             <button className="play-btn-secondary" onClick={() => { setError(null); setLoading(true); API.capturesToday().then((r) => { const res = (r && r.result) || {}; setItems(res.items || []); setCounts(res.counts || {}); setLoading(false); }).catch((e) => { setError(e.message); setLoading(false); }); }}>↻ Retry</button>
           </div>
         </div>
       )
       : mergedItems.length === 0 ? (
        <div className="empty"><div className="empty-icon">💭</div>Nothing captured yet today. Tap any capture button mid-commute (flag, insight, note, question, learn) and it'll appear here.</div>
      ) : (
        mergedItems.map((item) => {
          const meta = CAPTURE_TYPE_META[item.type] || { icon: "•", label: item.type };
          // Pending items (Item 4B) are non-clickable — they don't have a
          // server-side URL yet. Errata → in-player jump. Insight → /insights.
          // Gap / OQ / RN → Notion page URL (when synced).
          const onClick = item._pending
            ? undefined
            : item.type === "errata"
              ? () => onJump(item.module_id, item.timestamp_seconds || 0)
              : item.type === "insight"

// MINI PLAYER
function MiniPlayer({ playing, audioRef, onExpand, onStop }) {
  const [isPlaying, setIsPlaying] = useState(false);
  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    const updP = () => setIsPlaying(!a.paused);
    a.addEventListener("play", updP); a.addEventListener("pause", updP);
    updP();
    return () => { a.removeEventListener("play", updP); a.removeEventListener("pause", updP); };
  }, []);
  const toggle = (e) => {
    e.stopPropagation();
    const a = audioRef.current; if (!a) return;
    if (a.paused) a.play(); else a.pause();
  };
  return (
    <div className="mini-player">
      <div className="mini-info" onClick={onExpand}>
        <div className="mini-title">{playing.title}</div>
        <div className="mini-sub">{playing.kind === "brief" ? "Brief" : "Episode"} · {playing.series}</div>
      </div>
      <button className="mini-btn" onClick={toggle} aria-label={isPlaying ? "Pause" : "Play"}>{isPlaying ? "⏸" : "▶"}</button>
      <button className="mini-btn" onClick={(e) => { e.stopPropagation(); onStop(); }} aria-label="Stop and close player">×</button>
    </div>
  );
}

// REACT SHEET
function ReactSheet({ moduleId, onClose, onDone, showToast }) {
  const [phase, setPhase] = useState("idle");
  const [transcript, setTranscript] = useState("");
  const [stage, setStage] = useState("");
  const recogRef = useRef(null);

  const hasSpeech = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);

  const startRecord = () => {
    if (!hasSpeech) { setPhase("review"); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.continuous = true; r.interimResults = true; r.lang = "en-US";
    let final = "";
    r.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t + " ";
        else interim += t;
      }
      setTranscript((final + interim).trim());
    };
    r.onerror = () => setPhase("review");
    r.onend = () => setPhase("review");
    recogRef.current = r;
    try { r.start(); setPhase("recording"); } catch (_) { setPhase("review"); }
  };

  const stopRecord = () => { if (recogRef.current) { try { recogRef.current.stop(); } catch (_) {} } setPhase("review"); };

  useEffect(() => {
    if (hasSpeech) startRecord();
    return () => { if (recogRef.current) try { recogRef.current.stop(); } catch (_) {} };
  }, []);

  // Voice "approve" shortcut: if the transcript is a clean approve, skip NLU
  // and fire the fast /api/uc3/module-approve path (~1s instead of 3-8 min).
  const APPROVE_ONLY = /^\s*(approve\.?|approve it\.?|just approve\.?|yes approve\.?|sounds good\.?|approve this\.?|approved\.?)\s*$/i;

  const submit = async () => {
    const t = transcript.trim();
    if (!t) return;
    // Short-circuit: voice "approve" → quick approve path
    if (APPROVE_ONLY.test(t)) {
      setPhase("submitting");
      setStage("Approving…");
      try {
        await API.approve(moduleId);
        onDone("Approved by voice.");
      } catch (e) {
        showToast && showToast("Approve failed: " + e.message);
        setPhase("review");
      }
      return;
    }
    setPhase("submitting");
    const stages = ["Parsing your reaction…", "Routing actions…", "Updating the episode…"];
    let i = 0; setStage(stages[0]);
    const stageTimer = setInterval(() => { i = (i + 1) % stages.length; setStage(stages[i]); }, 4000);
    try {
      const r = await API.reactFeedback(moduleId, t);
      clearInterval(stageTimer);
      const actions = (r.result && r.result.parsed && r.result.parsed.actions) || [];
      const results = (r.result && r.result.dispatch && r.result.dispatch.results) || [];
      const failed = results.filter((x) => x && x.ok === false).length;
      // F14 mitigation: 207 partial dispatches surface as `_partial: true` in
      // the api helper. The pre-F14 version reported "N actions" regardless of
      // how many actually applied, so the user thought their full intent landed
      // even when half of it was dropped.
      if (r._partial || failed > 0) {
        onDone(`Reaction processed — ${failed} of ${actions.length} actions couldn't apply. Check the series page.`);
      } else {
        onDone(`Reaction processed: ${actions.length} action${actions.length === 1 ? "" : "s"}`);
      }
    } catch (e) {
      clearInterval(stageTimer);
      showToast && showToast("Reaction failed: " + e.message);
      setPhase("review");
    }
  };

  return (
    <div className="sheet-backdrop" onClick={() => phase !== "submitting" && onClose()}>
      <div className="sheet" role="dialog" aria-modal="true" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-handle"></div>
        <div className="sheet-title">🎙 React to this</div>
        {phase === "recording" && (
          <>
            <div className="sheet-sub">Speak your reaction. Tap to stop.</div>
            <div className="sheet-record-wrap">
              <button className="sheet-record-btn recording" onClick={stopRecord} aria-label="Stop recording">⏹</button>
              <div className="sheet-record-hint">Recording…</div>
            </div>
            <textarea className="sheet-input" value={transcript} readOnly placeholder="…" />
          </>
        )}
        {phase === "review" && (
          <>
            <div className="sheet-sub">Edit if needed, then submit. Processing can take 3–8 minutes.</div>
            <textarea className="sheet-input" placeholder="e.g. Approve this. But fix the SEC date — I think it's 45 days, not 40." value={transcript} onChange={(e) => setTranscript(e.target.value)} autoFocus />
            <div className="sheet-buttons">
              <button className="sheet-btn-secondary" onClick={hasSpeech ? startRecord : onClose}>{hasSpeech ? "🎙 Re-record" : "Cancel"}</button>
              <button className="sheet-btn-primary" onClick={submit} disabled={!transcript.trim()}>Submit</button>
            </div>
          </>
        )}
        {phase === "submitting" && (
          <>
            <div className="sheet-sub">{stage}</div>
            <div className="sheet-status">
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div className="spinner"></div>
                <div>Up to 8 minutes. You can leave this screen — your reaction will keep processing.</div>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}
